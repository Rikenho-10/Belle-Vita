<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belle Vita Premium - Ricardo</title>
    <!-- Librería para la imagen de WhatsApp -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        :root {
            --emerald: #0b1f15;
            --gold: #c5a059;
            --gold-light: #e4c68d;
            --paper: #fdfaf5;
            --rojo: #b03a2e;
            --verde: #1e8449;
            --sh-in: inset 3px 3px 6px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--emerald); color: white; display: flex; justify-content: center; min-height: 100vh; }
        .app-shell { width: 100%; max-width: 480px; display: flex; flex-direction: column; background: var(--emerald); }

        /* HEADER */
        .header { padding: 30px 15px; text-align: center; }
        .logo-box { 
            width: 80px; height: 80px; background: white; margin: 0 auto 10px; 
            border-radius: 50%; border: 3px solid var(--gold); 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            box-shadow: 0 0 20px var(--gold); cursor: pointer;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .logo-box b { font-size: 30px; color: var(--emerald); }
        .header h1 { font-family: 'Playfair Display', serif; color: var(--gold); margin: 0; font-size: 24px; letter-spacing: 3px; text-transform: uppercase; }

        /* NAVEGACION */
        .tabs { display: flex; padding: 0 20px; gap: 10px; margin-top: -15px; }
        .tab-btn { 
            flex: 1; padding: 15px; border-radius: 12px; border: 1px solid var(--gold); 
            font-weight: 900; font-size: 10px; cursor: pointer; text-align: center;
            background: rgba(0,0,0,0.4); color: var(--gold); transition: 0.3s;
        }
        .tab-btn.active { background: var(--gold); color: var(--emerald); }

        /* CONTENIDO */
        .view { padding: 25px 20px; flex: 1; }
        .lux-card { background: rgba(255,255,255,0.04); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(197,160,89,0.2); }
        .lux-lbl { font-size: 10px; font-weight: 900; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 1px; }
        
        input, select { 
            width: 100%; padding: 14px; border: none; border-radius: 10px; 
            background: rgba(0,0,0,0.3); color: white; margin-bottom: 15px;
            box-shadow: var(--sh-in); font-family: inherit; font-weight: 600;
        }

        .btn-action { 
            width: 100%; padding: 16px; border-radius: 12px; border: none; 
            font-weight: 900; text-transform: uppercase; cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); transition: 0.2s;
        }
        .btn-gold { background: linear-gradient(135deg, var(--gold-light), var(--gold)); color: var(--emerald); }
        .btn-dark { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .btn-green { background: var(--verde); color: white; margin-top: 20px; font-size: 16px; }
        .btn-action:active { transform: scale(0.97); }

        .log-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 8px; border-left: 4px solid var(--gold); }
        .btn-del { background: rgba(176, 58, 46, 0.3); color: #ff6b6b; border: none; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 900; }

        /* REPORTE CANVAS - DISEÑO 416418 */
        #reporte-export {
            width: 800px; height: 1100px; background: var(--emerald);
            padding: 40px; position: relative; color: white; display: flex; flex-direction: column;
            border: 2px solid var(--gold);
        }
        .c-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .c-logo-group { display: flex; align-items: center; gap: 20px; }
        .c-logo-circle { width: 120px; height: 120px; border: 4px solid var(--gold); border-radius: 50%; background: white; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .c-logo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .c-club-text h2 { font-family: 'Playfair Display', serif; font-size: 48px; margin: 0; letter-spacing: 2px; }
        .c-club-text p { color: var(--gold); font-size: 12px; text-transform: uppercase; margin: 0; letter-spacing: 4px; }

        .c-date-box { border: 2px solid var(--gold); padding: 12px 25px; text-align: center; border-radius: 15px; background: rgba(0,0,0,0.3); }
        .c-date-n { font-size: 50px; font-weight: 900; line-height: 1; }
        .c-date-t { font-size: 14px; color: var(--gold); text-transform: uppercase; font-weight: 800; margin-top: 5px; }

        .c-main { display: flex; gap: 35px; flex: 1; }
        .c-left-col { flex: 1.3; }
        .c-right-col { flex: 0.7; display: flex; flex-direction: column; gap: 20px; }

        .c-table { width: 100%; border-collapse: separate; border-spacing: 0 5px; background: var(--paper); border-radius: 12px; border: 3px solid var(--gold); }
        .c-table th { background: var(--emerald); color: var(--gold); padding: 14px; font-size: 16px; text-transform: uppercase; }
        .c-table td { padding: 12px 15px; color: var(--emerald); font-weight: 700; font-size: 18px; border-bottom: 1px solid rgba(0,0,0,0.05); }

        .c-exec-box { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(255,255,255,0.03); border: 2px solid var(--gold); border-radius: 40px; text-align: center; }
        .c-exec-lbl { font-size: 20px; color: var(--gold); text-transform: uppercase; letter-spacing: 5px; margin-bottom: 15px; }
        .c-exec-val { font-size: 110px; font-weight: 900; color: white; text-shadow: 0 0 20px var(--gold); }

        .c-badge-pill { background: rgba(0,0,0,0.5); border: 1px solid var(--gold); border-radius: 60px; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .c-badge-lbl { font-size: 14px; color: var(--gold); text-transform: uppercase; font-weight: 800; font-family: 'Playfair Display'; }
        .c-badge-num { background: var(--verde); color: white; min-width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; border-radius: 35px; font-size: 26px; font-weight: 900; }

        .c-stat-card { background: var(--paper); color: var(--emerald); border-radius: 15px; padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; border-left: 10px solid var(--gold); }
        .c-stat-card.rojo { border-left-color: var(--rojo); color: var(--rojo); }
        .c-stat-card.verde { border-left-color: var(--verde); color: var(--verde); }
        .c-stat-val { font-size: 30px; font-weight: 900; }

        .c-footer { margin-top: 40px; text-align: center; border-top: 1px solid rgba(197,160,89,0.3); padding-top: 30px; font-family: 'Playfair Display', serif; font-style: italic; font-size: 24px; }

        .hidden { display: none !important; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--gold); color: var(--emerald); padding: 15px 30px; border-radius: 50px; font-weight: 900; opacity: 0; transition: 0.5s; z-index: 9999; }
    </style>
</head>
<body>

<div class="app-shell">
    <!-- HEADER CON CARGA DE LOGO -->
    <div class="header">
        <input type="file" id="logo-input" class="hidden" accept="image/*">
        <div class="logo-box" id="logo-btn">
            <img id="ui-logo-img" class="hidden">
            <b id="ui-logo-def">BV</b>
        </div>
        <h1>Belle Vita</h1>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn active" id="tab-o" onclick="mostrarSeccion('oper')">OPERACIÓN</button>
        <button class="tab-btn" id="tab-r" onclick="mostrarSeccion('repo')">REPORTES</button>
    </div>

    <!-- VISTA REGISTRO -->
    <div id="view-oper" class="view">
        <div class="lux-card">
            <span class="lux-lbl">📅 Día de Trabajo</span>
            <input type="date" id="fecha-actual">
        </div>
        <div class="lux-card">
            <span class="lux-lbl">🥤 Barra (Socio)</span>
            <input type="text" id="nombre-socio" placeholder="Nombre">
            <input type="number" id="monto-socio" placeholder="Monto $">
            <button class="btn-action btn-gold" onclick="guardarRegistro('normal')">Añadir Consumo</button>
        </div>
        <div class="lux-card">
            <span class="lux-lbl">📦 Venta de Producto</span>
            <input type="text" id="nombre-prod" placeholder="Producto">
            <input type="number" id="monto-prod" placeholder="Monto $">
            <button class="btn-action btn-dark" onclick="guardarRegistro('cerrado')">Registrar Venta</button>
        </div>
        <span class="lux-lbl">Actividad de Hoy</span>
        <div id="bitacora-lista"></div>
    </div>

    <!-- VISTA REPORTES -->
    <div id="view-repo" class="view hidden">
        <div class="lux-card">
            <span class="lux-lbl">Periodo de Cierre</span>
            <select id="filtro-modo" onchange="ejecutarCalculos()">
                <option value="dia">Reporte Diario</option>
                <option value="semana">Semanal (Vie-Jue)</option>
                <option value="mes">Reporte Mensual</option>
                <option value="rango">Rango Libre</option>
            </select>
            <div id="filtro-simple">
                <input type="date" id="fecha-ref" onchange="ejecutarCalculos()">
            </div>
            <div id="filtro-rango" class="hidden">
                <input type="date" id="rango-de" onchange="ejecutarCalculos()">
                <input type="date" id="rango-a" onchange="ejecutarCalculos()">
            </div>
        </div>

        <!-- REPORTE PARA CAPTURA (OCULTO) -->
        <div style="position: absolute; top: -10000px; left: -10000px;">
            <div id="reporte-export">
                <div class="c-header">
                    <div class="c-logo-group">
                        <div class="c-logo-circle">
                            <img id="can-logo-img" class="hidden">
                            <b id="can-logo-def" style="font-size: 55px; color: #c5a059;">BV</b>
                        </div>
                        <div class="c-club-text">
                            <h2>BELLE VITA</h2>
                            <p>Luxury Nutrition Experience</p>
                        </div>
                    </div>
                    <div class="c-date-box">
                        <div class="c-date-n" id="c-fecha-num">21</div>
                        <div class="c-date-t" id="c-fecha-txt">Abril, 2026</div>
                    </div>
                </div>
                <div class="c-main">
                    <div class="c-left-col" id="c-dinamico"></div>
                    <div class="c-right-col">
                        <div class="c-badge-pill">
                            <span class="c-badge-lbl" id="c-txt-lbl">Consumos</span>
                            <span class="c-badge-num" id="c-val-consumos">0</span>
                        </div>
                        <div class="c-stat-card"><span>P. Cerrado</span><div class="c-stat-val" id="c-val-cerrado">$0</div></div>
                        <div class="c-stat-card"><span>Vta Total</span><div class="c-stat-val" id="c-val-total">$0</div></div>
                        <div class="c-stat-card rojo"><span>Rojo</span><div class="c-stat-val" id="c-val-rojo">$0</div></div>
                        <div class="c-stat-card verde"><span>Verde</span><div class="c-stat-val" id="c-val-verde">$0</div></div>
                    </div>
                </div>
                <div class="c-footer">Belle Vita, belleza que nace de ti.</div>
            </div>
        </div>
        <button class="btn-action btn-green" onclick="generarFlyer()">📸 GENERAR PARA WHATSAPP</button>
    </div>
</div>

<div id="toast"></div>

<script>
    // --- DATABASE ---
    var club_data = JSON.parse(localStorage.getItem('bv_master_v15')) || [];
    var club_logo = localStorage.getItem('bv_logo_v15') || null;

    // --- INICIALIZAR ---
    window.onload = function() {
        var hoy = new Date().toISOString().split('T')[0];
        document.getElementById('fecha-actual').value = hoy;
        document.getElementById('fecha-ref').value = hoy;
        document.getElementById('rango-de').value = hoy;
        document.getElementById('rango-a').value = hoy;
        
        if(club_logo) aplicarLogo(club_logo);
        renderizarBitacora();

        // Listener de Logo Blindado
        document.getElementById('logo-btn').onclick = function() {
            document.getElementById('logo-input').click();
        };
    };

    // --- LOGO ---
    document.getElementById('logo-input').onchange = function(e) {
        var file = e.target.files[0];
        if(file) {
            var reader = new FileReader();
            reader.onload = function(ev) {
                club_logo = ev.target.result;
                localStorage.setItem('bv_logo_v15', club_logo);
                aplicarLogo(club_logo);
            };
            reader.readAsDataURL(file);
        }
    };

    function aplicarLogo(url) {
        document.getElementById('ui-logo-img').src = url;
        document.getElementById('ui-logo-img').classList.remove('hidden');
        document.getElementById('ui-logo-def').classList.add('hidden');
        document.getElementById('can-logo-img').src = url;
        document.getElementById('can-logo-img').classList.remove('hidden');
        document.getElementById('can-logo-def').classList.add('hidden');
    }

    // --- NAVEGACION ---
    function mostrarSeccion(s) {
        document.getElementById('view-oper').classList.toggle('hidden', s !== 'oper');
        document.getElementById('view-repo').classList.toggle('hidden', s !== 'repo');
        document.getElementById('tab-o').classList.toggle('active', s === 'oper');
        document.getElementById('tab-r').classList.toggle('active', s === 'repo');
        if(s === 'repo') ejecutarCalculos();
    }

    // --- OPERACION ---
    function guardarRegistro(tipo) {
        var n, m;
        var fecha = document.getElementById('fecha-actual').value;
        if(tipo === 'normal') {
            n = document.getElementById('nombre-socio').value || "Socio";
            m = parseFloat(document.getElementById('monto-socio').value);
            document.getElementById('nombre-socio').value = '';
            document.getElementById('monto-socio').value = '';
        } else {
            n = document.getElementById('nombre-prod').value || "Venta";
            m = parseFloat(document.getElementById('monto-prod').value);
            document.getElementById('nombre-prod').value = '';
            document.getElementById('monto-prod').value = '';
        }
        if(isNaN(m)) return;

        club_data.push({ id: Date.now(), fecha: fecha, nombre: n, monto: m, tipo: tipo });
        localStorage.setItem('bv_master_v15', JSON.stringify(club_data));
        renderizarBitacora();
        lanzarToast("✅ Guardado");
    }

    function borrarRegistro(id) {
        club_data = club_data.filter(function(i) { return i.id !== id; });
        localStorage.setItem('bv_master_v15', JSON.stringify(club_data));
        renderizarBitacora();
    }

    function renderizarBitacora() {
        var box = document.getElementById('bitacora-lista');
        var hoy = document.getElementById('fecha-actual').value;
        var filtrados = club_data.filter(function(d) { return d.fecha === hoy; });
        if(filtrados.length === 0) { box.innerHTML = '<p style="text-align:center; color:#555; font-size:12px;">Sin ventas</p>'; return; }
        box.innerHTML = filtrados.map(function(i) {
            return '<div class="log-row"><div><b>' + (i.tipo === 'cerrado' ? '📦' : '🥤') + ' ' + i.nombre + '</b><br><small>$' + i.monto.toFixed(2) + '</small></div><button class="btn-del" onclick="borrarRegistro(' + i.id + ')">BORRAR</button></div>';
        }).join('');
    }

    // --- REPORTES ---
    function ejecutarCalculos() {
        var modo = document.getElementById('filtro-modo').value;
        document.getElementById('filtro-simple').classList.toggle('hidden', modo === 'rango');
        document.getElementById('filtro-rango').classList.toggle('hidden', modo !== 'rango');

        var filtrados = [];
        var dI, dF, diasSet = new Set();

        if(modo === 'rango') {
            dI = new Date(document.getElementById('rango-de').value + 'T12:00:00');
            dF = new Date(document.getElementById('rango-a').value + 'T12:00:00');
            filtrados = club_data.filter(function(d) {
                var f = new Date(d.fecha + 'T12:00:00');
                if(f >= dI && f <= dF) { if(d.tipo === 'normal') diasSet.add(d.fecha); return true; }
                return false;
            });
        } else {
            var r = document.getElementById('fecha-ref').value;
            var dR = new Date(r + 'T12:00:00');
            if(modo === 'dia') { filtrados = club_data.filter(function(d) { return d.fecha === r; }); dI = dR; dF = dR; }
            else if(modo === 'semana') {
                var dia = dR.getDay();
                var diff = (dia >= 5) ? (dia - 5) : (dia + 2);
                dI = new Date(dR); dI.setDate(dR.getDate() - diff);
                dF = new Date(dI); dF.setDate(dI.getDate() + 6);
                filtrados = club_data.filter(function(d) {
                    var f = new Date(d.fecha + 'T12:00:00');
                    if(f >= dI && f <= dF) { if(d.tipo === 'normal') diasSet.add(d.fecha); return true; }
                    return false;
                });
            } else {
                filtrados = club_data.filter(function(d) {
                    var f = new Date(d.fecha + 'T12:00:00');
                    if(f.getMonth() === dR.getMonth() && f.getFullYear() === dR.getFullYear()) { if(d.tipo === 'normal') diasSet.add(d.fecha); return true; }
                    return false;
                });
                dI = new Date(dR.getFullYear(), dR.getMonth(), 1);
                dF = new Date(dR.getFullYear(), dR.getMonth() + 1, 0);
            }
        }

        var barra = filtrados.filter(function(f) { return f.tipo === 'normal'; });
        var cerrVal = filtrados.filter(function(f) { return f.tipo === 'cerrado'; }).reduce(function(a, x) { return a + x.monto; }, 0);
        var barrVal = barra.reduce(function(a, x) { return a + x.monto; }, 0);
        var total = barrVal + cerrVal;
        var consT = barrVal / 90;
        var avg = (consT / (diasSet.size || 1)).toFixed(2);

        document.getElementById('c-fecha-num').innerText = dI.getDate();
        document.getElementById('c-fecha-txt').innerText = dI.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
        document.getElementById('c-txt-lbl').innerText = modo === 'dia' ? 'Consumos' : 'Promedio';
        document.getElementById('c-val-consumos').innerText = modo === 'dia' ? consT.toFixed(2) : avg;
        document.getElementById('c-val-cerrado').innerText = '$' + cerrVal.toLocaleString();
        document.getElementById('c-val-total').innerText = '$' + tota
