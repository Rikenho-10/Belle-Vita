<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nutrition Club - Belle Vita Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        :root {
            --verde-club: #1b3a1b;
            --oro: #d4af37;
            --oro-luz: #f1d37a;
            --crema: #fdfaf5;
            --rojo-sobre: #b03a2e;
            --verde-sobre: #1e8449;
            --bisel-fuera: 5px 5px 12px #d1cfca, -5px -5px 12px #ffffff;
            --bisel-dentro: inset 3px 3px 6px #d9d6d1, inset -3px -3px 6px #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--crema);
            color: var(--verde-club);
            display: flex;
            justify-content: center;
        }

        .app-shell {
            width: 100%;
            max-width: 480px;
            background: var(--crema);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Encabezado con Neón */
        .header {
            background: var(--verde-club);
            padding: 15px;
            text-align: center;
            border-radius: 0 0 40px 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            position: relative;
            z-index: 5;
        }

        .logo-neon {
            width: 65px;
            height: 65px;
            background: white;
            margin: 0 auto 10px;
            border-radius: 50%;
            border: 2px solid var(--oro);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            animation: glow 2s infinite ease-in-out;
        }

        @keyframes glow {
            0% { box-shadow: 0 0 10px var(--oro); }
            50% { box-shadow: 0 0 25px var(--oro-luz), 0 0 40px var(--oro); }
            100% { box-shadow: 0 0 10px var(--oro); }
        }

        .logo-neon img { width: 100%; height: 100%; object-fit: cover; }
        .logo-neon span { font-size: 24px; font-weight: 900; color: var(--verde-club); }

        .header h1 { 
            font-family: 'Playfair Display', serif;
            color: var(--oro);
            margin: 0;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Navegación */
        .nav-tabs {
            display: flex;
            padding: 0 20px;
            gap: 15px;
            margin-top: -20px;
            position: relative;
            z-index: 10;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border-radius: 18px;
            border: none;
            font-weight: 800;
            font-size: 11px;
            cursor: pointer;
            background: var(--crema);
            box-shadow: var(--bisel-fuera);
            color: #888;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--verde-club);
            color: var(--oro);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .content { padding: 30px 20px; flex: 1; }

        /* Contenedores Neumórficos */
        .card-premium {
            background: var(--crema);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--bisel-fuera);
        }

        .label-gold {
            font-size: 10px;
            font-weight: 900;
            color: #aa8507;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 15px;
            background: var(--crema);
            box-shadow: var(--bisel-dentro);
            margin-bottom: 12px;
            font-family: inherit;
            font-weight: 700;
            color: var(--verde-club);
            outline: none;
        }

        /* Botones Premium */
        .btn-action {
            width: 100%;
            padding: 16px;
            border-radius: 18px;
            border: none;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            color: white;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.2);
            transition: 0.2s;
        }

        .btn-gold { background: linear-gradient(145deg, var(--oro-luz), var(--oro)); }
        .btn-dark { background: var(--verde-club); color: var(--oro); }
        .btn-green { background: #27ae60; margin-top: 20px; font-size: 16px; }

        .btn-action:active { transform: scale(0.97); }

        .log-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: white;
            border-radius: 15px;
            margin-bottom: 10px;
            border-left: 4px solid var(--oro);
        }
        .btn-del { background: #fff1f0; color: #ff4d4d; border: none; padding: 5px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; }

        /* REPORTE BELLE VITA */
        #reporte-area {
            background-color: var(--crema);
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M60 20c10 20 40 20 40 60s-30 20-40 20-40-20-40-60 30-40 40-20z' fill='%23d4af37' fill-opacity='0.04'/%3E%3C/svg%3E");
            padding: 30px;
            border: 2px solid var(--oro);
            border-radius: 10px;
            min-height: 700px;
            position: relative;
        }

        .rep-fecha { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--oro); font-style: italic; border-bottom: 1px solid rgba(212, 175, 55, 0.3); margin-bottom: 20px; padding-bottom: 5px; text-transform: capitalize; }
        
        .rep-cols { display: flex; gap: 15px; }
        .rep-tabla { flex: 1; }
        .rep-stats { width: 160px; text-align: right; }

        .tabla-header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--oro); padding-bottom: 5px; font-size: 11px; font-weight: 900; margin-bottom: 5px; }
        .tabla-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(212, 175, 55, 0.1); font-size: 9px; font-weight: 700; text-transform: uppercase; }
        .tabla-total { display: flex; justify-content: space-between; padding: 15px 0; border-top: 2px solid var(--oro); font-weight: 900; margin-top: 10px; font-size: 13px; }

        .rep-badge-consumos { 
            background: white; 
            border-radius: 50px; 
            padding: 5px 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #eee; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            margin-bottom: 30px;
            min-width: 140px;
        }
        .rep-badge-lbl { font-size: 9px; font-weight: 900; color: var(--oro); }
        .rep-badge-num { 
            background: #6b8e23; 
            color: white; 
            min-width: 45px;
            height: 45px; 
            padding: 0 8px;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 25px; 
            font-size: 18px; 
            font-weight: 900;
            margin-left: 5px;
        }

        .stat-line { display: flex; justify-content: space-between; font-size: 11px; font-weight: 900; margin-bottom: 12px; border-bottom: 1px dashed #ddd; padding-bottom: 4px; }
        .stat-line.rojo { color: var(--rojo-sobre); border-color: rgba(176, 58, 46, 0.2); }
        .stat-line.verde { color: var(--verde-sobre); border-color: rgba(30, 132, 73, 0.2); }

        .rep-logo-final { width: 120px; height: 120px; background: white; border-radius: 50%; border: 4px solid var(--oro); margin: 30px auto 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .rep-logo-final img { width: 100%; height: 100%; object-fit: cover; }

        .hidden { display: none; }
        #toast { position: fixed; bottom: 20px; background: var(--verde-club); color: var(--oro); padding: 12px 25px; border-radius: 50px; font-weight: 700; font-size: 12px; opacity: 0; transition: 0.5s; z-index: 1000; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="header">
        <input type="file" id="upLogo" class="hidden" accept="image/*">
        <div class="logo-neon" onclick="document.getElementById('upLogo').click()">
            <img id="displayLogo" class="hidden">
            <span id="textLogo">BV</span>
        </div>
        <h1>Belle Vita Club</h1>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" id="tab-reg" onclick="show('reg')">DIARIO</button>
        <button class="tab-btn" id="tab-rep" onclick="show('rep')">REPORTES</button>
    </div>

    <!-- VISTA REGISTRO -->
    <div id="v-reg" class="content">
        <div class="card-premium">
            <span class="label-gold">📅 Operación del día</span>
            <input type="date" id="inputFecha">
        </div>

        <div class="card-premium">
            <span class="label-gold">🥤 Registro de Barra</span>
            <input id="inNombre" placeholder="Nombre Socio">
            <input type="number" id="inMonto" placeholder="Total $">
            <button class="btn-action btn-gold" onclick="guardar('normal')">Guardar Consumo</button>
        </div>

        <div class="card-premium">
            <span class="label-gold">📦 Producto Cerrado</span>
            <input id="inCerrado" placeholder="Producto">
            <input type="number" id="inMontoCerrado" placeholder="Total $">
            <button class="btn-action btn-dark" onclick="guardar('cerrado')">Registrar Venta</button>
        </div>

        <span class="label-gold">Movimientos</span>
        <div id="listaMovs"></div>
    </div>

    <!-- VISTA REPORTES -->
    <div id="v-rep" class="content hidden">
        <div class="card-premium">
            <span class="label-gold">🔍 Filtro de Periodo</span>
            <select id="selModo" onchange="actualizarInterfazReporte()">
                <option value="dia">Día Seleccionado</option>
                <option value="semana">Semana (Vie - Jue)</option>
                <option value="mes">Mes Completo</option>
            </select>
            <input type="date" id="repRefFecha" onchange="armarReporte()">
        </div>

        <div id="reporte-area">
            <div id="rep-titulo" style="font-weight:900; color:var(--verde-club); font-size:12px; margin-bottom:5px; text-transform:uppercase; letter-spacing:1px">Reporte Belle Vita</div>
            <div id="rep-fecha" class="rep-fecha">...</div>
            
            <div class="rep-cols">
                <div class="rep-tabla">
                    <div class="tabla-header">
                        <span style="margin-left:20px">Nombre</span>
                        <span style="margin-right:15px">$</span>
                    </div>
                    <div id="rep-filas"></div>
                    <div class="tabla-total">
                        <span style="margin-left:20px">TOTAL</span>
                        <span style="margin-right:15px" id="rep-total-barra">$0</span>
                    </div>
                </div>

                <div class="rep-stats">
                    <div class="rep-badge-consumos">
                        <span class="rep-badge-lbl">CONSUMOS</span>
                        <span class="rep-badge-num" id="rep-consumos">0</span>
                    </div>

                    <div class="stat-line"><span style="color:#aaa">P. Cerrado</span> <span id="rep-val-cerrado">$0</span></div>
                    <div class="stat-line"><span style="color:#aaa">Vta Total</span> <span id="rep-val-total">$0</span></div>
                    <div class="stat-line rojo"><span>SOBRE ROJO</span> <span id="rep-val-rojo">$0</span></div>
                    <div class="stat-line verde"><span>SOBRE VERDE</span> <span id="rep-val-verde">$0</span></div>

                    <div class="rep-logo-final">
                        <img id="logoEnReporte" class="hidden">
                        <span id="logoTxtReporte" style="font-size:35px; font-weight:900; color:var(--oro)">BV</span>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn-action btn-green" onclick="generarImagen()">📸 GENERAR IMAGEN PARA COMPARTIR</button>
    </div>
</div>

<div id="toast"></div>

<script>
    let db = JSON.parse(localStorage.getItem('belle_vita_final_v1')) || [];
    let logo = localStorage.getItem('belle_vita_logo_v1') || null;

    const inFecha = document.getElementById('inputFecha');
    const refFecha = document.getElementById('repRefFecha');
    const selModo = document.getElementById('selModo');

    window.onload = () => {
        const hoy = new Date().toISOString().split('T')[0];
        inFecha.value = hoy;
        refFecha.value = hoy;
        if(logo) aplicarLogo(logo);
        renderLista();
    };

    document.getElementById('upLogo').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                logo = ev.target.result;
                localStorage.setItem('belle_vita_logo_v1', logo);
                aplicarLogo(logo);
            };
            reader.readAsDataURL(file);
        }
    });

    function aplicarLogo(url) {
        document.getElementById('displayLogo').src = url;
        document.getElementById('displayLogo').classList.remove('hidden');
        document.getElementById('textLogo').classList.add('hidden');
        document.getElementById('logoEnReporte').src = url;
        document.getElementById('logoEnReporte').classList.remove('hidden');
        document.getElementById('logoTxtReporte').classList.add('hidden');
    }

    function show(v) {
        document.getElementById('v-reg').classList.toggle('hidden', v !== 'reg');
        document.getElementById('v-rep').classList.toggle('hidden', v !== 'rep');
        document.getElementById('tab-reg').classList.toggle('active', v === 'reg');
        document.getElementById('tab-rep').classList.toggle('active', v === 'rep');
        if(v === 'rep') armarReporte();
    }

    function guardar(tipo) {
        let n, m;
        if(tipo === 'normal') {
            n = document.getElementById('inNombre').value || "Socio";
            m = parseFloat(document.getElementById('inMonto').value);
            document.getElementById('inNombre').value = '';
            document.getElementById('inMonto').value = '';
        } else {
            n = document.getElementById('inCerrado').value || "Producto";
            m = parseFloat(document.getElementById('inMontoCerrado').value);
            document.getElementById('inCerrado').value = '';
            document.getElementById('inMontoCerrado').value = '';
        }
        if(isNaN(m)) return;
        db.push({ id: Date.now(), fecha: inFecha.value, nombre: n, monto: m, tipo });
        localStorage.setItem('belle_vita_final_v1', JSON.stringify(db));
        renderLista();
        popToast("✅ Registrado");
    }

    function borrar(id) {
        db = db.filter(i => i.id !== id);
        localStorage.setItem('belle_vita_final_v1', JSON.stringify(db));
        renderLista();
    }

    function renderLista() {
        const list = document.getElementById('listaMovs');
        const hoyItems = db.filter(d => d.fecha === inFecha.value);
        if(hoyItems.length === 0) { list.innerHTML = `<p style="text-align:center; color:#ccc; font-size:12px;">Sin ventas hoy</p>`; return; }
        list.innerHTML = hoyItems.map(i => `
            <div class="log-item">
                <div>
                    <b>${i.tipo === 'cerrado' ? '📦' : '🥤'} ${i.nombre}</b>
                    <span style="font-size:11px; color:#999;">$ ${i.monto.toFixed(2)}</span>
                </div>
                <button class="btn-del" onclick="borrar(${i.id})">QUITAR</button>
            </div>
        `).join('');
    }

    function actualizarInterfazReporte() {
        armarReporte();
    }

    function armarReporte() {
        const modo = selModo.value;
        const ref = refFecha.value;
        const dRef = new Date(ref + 'T12:00:00');
        
        let filtrados = [];
        let rTitulo = "Reporte Diario";
        let rSubtitulo = "";

        if(modo === 'dia') {
            filtrados = db.filter(d => d.fecha === ref);
            rTitulo = "Reporte Diario";
            rSubtitulo = dRef.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        } else if(modo === 'semana') {
            // Lógica: Viernes a Jueves
            let dia = dRef.getDay();
            let diffToFriday = (dia >= 5) ? (dia - 5) : (dia + 2);
            let inicio = new Date(dRef);
            inicio.setDate(dRef.getDate() - diffToFriday);
            let fin = new Date(inicio);
            fin.setDate(inicio.getDate() + 6);
            
            filtrados = db.filter(d => {
                let fItem = new Date(d.fecha + 'T12:00:00');
                return fItem >= inicio && fItem <= fin;
            });

            rTitulo = "Reporte Semanal";
            rSubtitulo = `${inicio.getDate()}/${inicio.getMonth()+1} al ${fin.getDate()}/${fin.getMonth()+1}`;
        } else if(modo === 'mes') {
            let mes = dRef.getMonth();
            let año = dRef.getFullYear();
            filtrados = db.filter(d => {
                let fItem = new Date(d.fecha + 'T12:00:00');
                return fItem.getMonth() === mes && fItem.getFullYear() === año;
            });
            rTitulo = "Reporte Mensual";
            rSubtitulo = dRef.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
        }

        const barra = filtrados.filter(f => f.tipo === 'normal');
        const cerrado = filtrados.filter(f => f.tipo === 'cerrado');
        const sumBarra = barra.reduce((a, b) => a + b.monto, 0);
        const sumCerrado = cerrado.reduce((a, b) => a + b.monto, 0);
        const totalVta = sumBarra + sumCerrado;

        document.getElementById('rep-titulo').innerText = rTitulo;
        document.getElementById('rep-fecha').innerText = rSubtitulo;
        
        document.getElementById('rep-filas').innerHTML = barra.map((i, index) => `
            <div class="tabla-row">
                <div style="display:flex; gap:10px">
                    <span style="color:#bbb; width:15px; text-align:right">${index + 1}</span>
                    <span>${i.nombre}</span>
                </div>
                <div style="display:flex; gap:15px">
                    <span>$</span>
                    <span style="width:35px; text-align:right">${i.monto}</span>
                </div>
            </div>
        `).join('');

        document.getElementById('rep-total-barra').innerText = `$ ${sumBarra.toLocaleString()}`;
        document.getElementById('rep-consumos').innerText = (sumBarra / 90).toFixed(2);
        document.getElementById('rep-val-cerrado').innerText = `$ ${sumCerrado.toLocaleString()}`;
        document.getElementById('rep-val-total').innerText = `$ ${totalVta.toLocaleString()}`;
        document.getElemen
