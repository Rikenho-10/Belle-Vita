<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belle Vita - Sistema de Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --emerald: #062c26;
            --emerald-light: #0a3d34;
            --gold: #d4af37;
            --cream: #fef3c7;
            --sunken: rgba(0, 0, 0, 0.5);
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #041512;
            background-image: 
                radial-gradient(circle at 50% 0%, var(--emerald-light) 0%, transparent 75%),
                url('https://www.transparenttextures.com/patterns/marble-similar.png');
            color: var(--cream);
            min-height: 100vh;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        /* Efecto Hundido para Cajas de Texto */
        .sunken-input {
            background-color: rgba(0, 0, 0, 0.4) !important;
            box-shadow: inset 4px 4px 10px rgba(0, 0, 0, 0.8), 
                        inset -1px -1px 2px rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(212, 175, 55, 0.2) !important;
            color: var(--cream) !important;
            transition: all 0.2s;
        }
        .sunken-input:focus {
            border-color: var(--gold) !important;
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.9) !important;
        }

        .sunken-card {
            background: rgba(10, 61, 52, 0.4);
            box-shadow: inset 1px 1px 10px rgba(0,0,0,0.3);
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .gold-btn {
            background: linear-gradient(145deg, #d4af37, #b48a09);
            box-shadow: 2px 2px 10px rgba(0,0,0,0.4);
            color: black;
            font-weight: 800;
        }
        
        .gold-btn:active { transform: scale(0.95); box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5); }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
        
        .tab-active { color: var(--gold); border-bottom: 3px solid var(--gold); }
        
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('diario');
            const [currentDate, setCurrentDate] = useState(new Date().toISOString().split('T')[0]);
            const [logoUrl, setLogoUrl] = useState(localStorage.getItem('bv_logo_vfinal') || '');
            
            // Datos del día actual
            const [clients, setClients] = useState([]);
            const [closedProducts, setClosedProducts] = useState([]);
            const [movements, setMovements] = useState([]); // {type, concept, amount}

            // Historial para reportes
            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem('bv_history_vfinal');
                return saved ? JSON.parse(saved) : [];
            });

            // Formularios
            const [cForm, setCForm] = useState({ name: '', amount: '' });
            const [pForm, setPForm] = useState({ name: '', amount: '' });
            const [mForm, setMForm] = useState({ type: 'tarjeta', concept: '', amount: '' });

            // Rango Semanal
            const [weekStart, setWeekStart] = useState('');
            const [weekEnd, setWeekEnd] = useState('');

            // Cálculos
            const totals = useMemo(() => {
                const vtaClientes = clients.reduce((s, c) => s + Number(c.amount), 0);
                const vtaCerrado = closedProducts.reduce((s, p) => s + Number(p.amount), 0);
                const vtaTotal = vtaClientes + vtaCerrado;
                
                const cards = movements.filter(m => m.type === 'tarjeta').reduce((s, m) => s + Number(m.amount), 0);
                const pends = movements.filter(m => m.type === 'pendiente').reduce((s, m) => s + Number(m.amount), 0);
                const gas = movements.filter(m => m.type === 'gasto').reduce((s, m) => s + Number(m.amount), 0);

                return {
                    vtaClientes,
                    vtaCerrado,
                    vtaTotal,
                    consumos: (vtaClientes / 90).toFixed(2),
                    rojo: (vtaTotal * 0.7).toFixed(1),
                    verde: (vtaTotal * 0.3).toFixed(1),
                    efectivo: (vtaTotal - cards - pends - gas).toFixed(1),
                    cards, pends, gas
                };
            }, [clients, closedProducts, movements]);

            const handleLogo = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setLogoUrl(reader.result);
                        localStorage.setItem('bv_logo_vfinal', reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const addData = (state, setter, form, fSetter, empty) => {
                if (!form.amount) return;
                setter([...state, { ...form, id: Date.now() }]);
                fSetter(empty);
            };

            const removeData = (id, state, setter) => {
                setter(state.filter(item => item.id !== id));
            };

            const guardarCierre = () => {
                if (clients.length === 0) {
                    alert("Agregue clientes antes de cerrar el día.");
                    return;
                }
                const newEntry = {
                    date: currentDate,
                    consumos: Number(totals.consumos),
                    vtaTotal: totals.vtaTotal,
                    verde: Number(totals.verde),
                    efectivo: Number(totals.efectivo),
                    clients: [...clients]
                };
                const updated = [...history.filter(h => h.date !== currentDate), newEntry];
                setHistory(updated);
                localStorage.setItem('bv_history_vfinal', JSON.stringify(updated));
                alert("Cierre del día guardado con éxito.");
            };

            // Lógica de reportes históricos
            const weeklyData = useMemo(() => {
                if (!weekStart || !weekEnd) return { verde: 0, consumos: 0, estimado: 0 };
                const filtered = history.filter(h => h.date >= weekStart && h.date <= weekEnd);
                const sumVerde = filtered.reduce((s, h) => s + h.verde, 0);
                const sumConsumos = filtered.reduce((s, h) => s + h.consumos, 0);
                return { verde: sumVerde, consumos: sumConsumos, estimado: sumVerde * 4 };
            }, [history, weekStart, weekEnd]);

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col">
                    {/* Header Premium */}
                    <header className="p-6 flex flex-col items-center relative no-print">
                        <label className="cursor-pointer mb-4 group">
                            <div className="w-24 h-24 rounded-full border-2 border-gold sunken-card flex items-center justify-center overflow-hidden shadow-[0_0_20px_rgba(212,175,55,0.2)]">
                                {logoUrl ? <img src={logoUrl} className="w-full h-full object-cover" /> : <span className="text-[10px] text-gold font-bold">LOGOTIPO</span>}
                            </div>
                            <input type="file" className="hidden" onChange={handleLogo} />
                        </label>
                        <h1 className="text-3xl font-serif text-gold tracking-widest uppercase">Belle Vita</h1>
                        <p className="text-[10px] text-emerald-100/40 tracking-[0.4em] uppercase font-bold">Nutrición de Élite</p>
                    </header>

                    {/* Nav Tabs */}
                    <nav className="flex justify-around border-b border-white/5 mx-6 mb-6 no-print">
                        {['diario', 'caja', 'reportes'].map(t => (
                            <button key={t} onClick={() => setActiveTab(t)} className={`pb-2 text-[10px] font-bold uppercase tracking-widest transition-all ${activeTab === t ? 'tab-active' : 'opacity-40'}`}>
                                {t === 'diario' ? 'Ventas' : t}
                            </button>
                        ))}
                    </nav>

                    <main className="flex-1 px-4 pb-24 space-y-6">
                        
                        {activeTab === 'diario' && (
                            <div className="animate-in fade-in space-y-6">
                                {/* Dashboard rápido */}
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="sunken-card p-4 rounded-2xl text-center border-l-4 border-gold">
                                        <p className="text-[9px] uppercase gold-text opacity-70 mb-1">Consumos</p>
                                        <p className="text-4xl font-serif text-white">{totals.consumos}</p>
                                    </div>
                                    <div className="sunken-card p-4 rounded-2xl text-center">
                                        <p className="text-[9px] uppercase text-emerald-200 opacity-70 mb-1">Venta Total</p>
                                        <p className="text-2xl font-serif text-white">${totals.vtaTotal}</p>
                                    </div>
                                </div>

                                {/* Form Clientes */}
                                <section className="sunken-card p-5 rounded-3xl">
                                    <h3 className="text-[10px] uppercase text-gold font-bold mb-4 tracking-widest">Registrar Cliente</h3>
                                    <div className="flex gap-2 mb-4">
                                        <input type="text" placeholder="Nombre" value={cForm.name} onChange={e => setCForm({...cForm, name: e.target.value})} className="sunken-input flex-1 p-3 rounded-xl outline-none text-sm" />
                                        <input type="number" placeholder="$" value={cForm.amount} onChange={e => setCForm({...cForm, amount: e.target.value})} className="sunken-input w-20 p-3 rounded-xl outline-none text-center text-sm" />
                                        <button onClick={() => addData(clients, setClients, cForm, setCForm, {name:'', amount:''})} className="gold-btn w-12 rounded-xl text-xl">+</button>
                                    </div>
                                    <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar">
                                        {clients.map(c => (
                                            <div key={c.id} className="flex justify-between items-center bg-black/20 p-3 rounded-xl border border-white/5">
                                                <span className="text-xs">{c.name}</span>
                                                <div className="flex items-center gap-3">
                                                    <span className="text-sm font-bold text-gold">${c.amount}</span>
                                                    <button onClick={() => removeData(c.id, clients, setClients)} className="text-red-900 font-bold px-2">✕</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                {/* Producto Cerrado */}
                                <section className="sunken-card p-5 rounded-3xl">
                                    <h3 className="text-[10px] uppercase text-emerald-200/50 font-bold mb-4 tracking-widest">Producto Cerrado</h3>
                                    <div className="flex gap-2 mb-4">
                                        <input type="text" placeholder="Detalle" value={pForm.name} onChange={e => setPForm({...pForm, name: e.target.value})} className="sunken-input flex-1 p-3 rounded-xl outline-none text-sm" />
                                        <input type="number" placeholder="$" value={pForm.amount} onChange={e => setPForm({...pForm, amount: e.target.value})} className="sunken-input w-20 p-3 rounded-xl outline-none text-center text-sm" />
                                        <button onClick={() => addData(closedProducts, setClosedProducts, pForm, setPForm, {name:'', amount:''})} className="bg-emerald-900/50 border border-emerald-500/50 text-white w-12 rounded-xl text-xl">+</button>
                                    </div>
                                    {closedProducts.map(p => (
                                        <div key={p.id} className="flex justify-between items-center p-2 text-[11px] opacity-60">
                                            <span>• {p.name}</span>
                                            <div className="flex gap-3">
                                                <span>${p.amount}</span>
                                                <button onClick={() => removeData(p.id, closedProducts, setClosedProducts)} className="text-red-900">✕</button>
                                            </div>
                                        </div>
                                    ))}
                                </section>
                            </div>
                        )}

                        {activeTab === 'caja' && (
                            <div className="animate-in slide-in-from-right space-y-6">
                                <section className="sunken-card p-6 rounded-3xl">
                                    <h3 className="text-[10px] uppercase text-gold font-bold mb-5 tracking-widest text-center">Gestión de Caja</h3>
                                    <div className="flex justify-center gap-2 mb-6">
                                        {['tarjeta', 'pendiente', 'gasto'].map(t => (
                                            <button key={t} onClick={() => setMForm({...mForm, type: t})} className={`px-3 py-2 rounded-full text-[9px] font-bold uppercase transition-all ${mForm.type === t ? 'bg-gold text-black shadow-lg' : 'bg-black/40 opacity-40'}`}>
                                                {t === 'tarjeta' ? '💳 Tarjeta' : t === 'pendiente' ? '⏳ Deuda' : '💸 Gasto'}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="flex gap-2">
                                        <input type="text" placeholder="¿Quién o qué?" value={mForm.concept} onChange={e => setMForm({...mForm, concept: e.target.value})} className="sunken-input flex-1 p-3 rounded-xl outline-none text-sm" />
                                        <input type="number" placeholder="$" value={mForm.amount} onChange={e => setMForm({...mForm, amount: e.target.value})} className="sunken-input w-20 p-3 rounded-xl outline-none text-center text-sm" />
                                        <button onClick={() => addData(movements, setMovements, mForm, setMForm, {...mForm, concept:'', amount:''})} className="gold-btn w-12 rounded-xl text-xl">+</button>
                                    </div>
                                </section>

                                <div className="space-y-2">
                                    {movements.map(m => (
                                        <div key={m.id} className="flex justify-between items-center bg-black/30 p-3 rounded-2xl border-l-4" 
                                            style={{borderColor: m.type==='tarjeta'?'#60a5fa':m.type==='pendiente'?'#fb923c':'#ef4444'}}>
                                            <div className="flex flex-col">
                                                <span className="text-[9px] font-bold uppercase opacity-40">{m.type}</span>
                                                <span className="text-xs">{m.concept}</span>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <span className="text-sm font-bold">-${m.amount}</span>
                                                <button onClick={() => removeData(m.id, movements, setMovements)} className="text-red-900">✕</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="bg-gradient-to-b from-emerald-900/40 to-black/80 p-8 rounded-[40px] border-2 border-emerald-500/20 text-center shadow-2xl">
                                    <p className="text-[10px] text-emerald-200 font-bold uppercase tracking-[0.3em] mb-2 opacity-70">Efectivo a Entregar</p>
                                    <p className="text-6xl font-serif text-white font-bold tracking-tighter drop-shadow-lg">${totals.efectivo}</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'reportes' && (
                            <div className="animate-in slide-in-from-right space-y-8">
                                {/* DIARIO */}
                                <section className="sunken-card p-6 rounded-3xl border-t-4 border-gold">
                                    <h2 className="text-xl font-serif text-gold text-center mb-4">Reporte Diario</h2>
                                    <div className="grid grid-cols-2 gap-3 mb-6">
                                        <div className="bg-red-950/20 p-4 rounded-2xl border border-red-900/30 text-center">
                                            <p className="text-[9px] text-red-500 font-bold uppercase mb-1">Rojo (70%)</p>
                                            <p className="text-xl font-serif">${totals.rojo}</p>
                                        </div>
                                        <div className="bg-green-950/20 p-4 rounded-2xl border border-green-900/30 text-center">
                                            <p className="text-[9px] text-green-500 font-bold uppercase mb-1">Verde (30%)</p>
                                            <p className="text-xl font-serif">${totals.verde}</p>
                                        </div>
                                    </div>
                                    <button onClick={guardarCierre} className="w-full gold-btn py-4 rounded-2xl text-[10px] uppercase tracking-widest shadow-xl">Guardar Cierre de Hoy</button>
                                </section>

                                {/* SEMANAL */}
                                <section className="sunken-card p-6 rounded-3xl">
                                    <h2 className="text-lg font-serif text-gold text-center mb-4 italic">Reporte Semanal</h2>
                                    <div className="flex gap-2 mb-6">
                                        <input type="date" value={weekStart} onChange={e => setWeekStart(e.target.value)} className="sunken-input flex-1 p-2 text-[10px] rounded-lg" />
                                        <span className="flex items-center text-gold">/</span>
                                        <input type="date" value={weekEnd} onChange={e => setWeekEnd(e.target.value)} className="sunken-input flex-1 p-2 text-[10px] rounded-lg" />
                                    </div>
                                    <div className="space-y-3">
                                        <div className="flex justify-between text-xs opacity-60"><span>Sum. Consumos:</span><span>{weeklyData.consumos.toFixed(1)}</span></div>
                                        <div className="flex justify-between text-xs opacity-60"><span>Sum. Verdes:</span><span>${weeklyData.verde.toFixed(1)}</span></div>
                                        <div className="bg-gold p-4 rounded-2xl text-black flex justify-between items-center mt-2">
                                            <span className="text-[10px] font-bold uppercase">Estimado Mensual:</span>
                                            <span className="text-2xl font-serif font-bold">${weeklyData.estimado.toFixed(1)}</span>
                                        </div>
                                    </div>
                                </section>

                                {/* MENSUAL */}
                                <section className="sunken-card p-6 rounded-3xl">
                                    <h2 className="text-lg font-serif text-gold text-center mb-4">Resumen Mensual</h2>
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center border-b border-white/5 pb-2">
                                            <span className="text-xs opacity-50">Total Sobres Verdes:</span>
                                            <span className="text-green-500 font-bold text-lg">${history.reduce((a,b)=>a+b.verde,0).toFixed(1)}</span>
                                        </div>
                                        <div className="flex justify-between items-center">
                                            <span className="text-xs opacity-50">Promedio Consumos:</span>
                                            <span className="gold-text font-serif text-lg">{history.length > 0 ? (history.reduce((a,b)=>a+b.consumos,0)/history.length).toFixed(2) : 0}</span>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        )}
                    </main>

                    {/* Botón Flotante Cámara (Esquina Superior) */}
                    <div className="fixed top-6 right-6 z-[100] no-print">
                        {/* Se mantiene el botón arriba para no estorbar */}
                    </div>

                    {/* Reporte de WhatsApp (Visualización para Screenshot) */}
                    {activeTab === 'diario' && clients.length > 0 && (
                        <div className="fixed bottom-24 right-4 no-print">
                            <button onClick={() => window.scrollTo(0, 0) || setTimeout(() => window.print(), 100)} className="gold-btn w-12 h-12 rounded-full text-xl shadow-2xl flex items-center justify-center">🖨️</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
