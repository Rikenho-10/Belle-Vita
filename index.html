    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        :root {
            --v-club: #1b3a1b;

            --oro-luz: #f1d37a;
            --crema: #fdfaf5;
            --rojo: #b03a2e;

        .app { width: 100%; max-width: 480px; background: var(--crema); min-height: 100vh; display: flex; flex-direction: column; }

        @keyframes glow { 0%, 100% { box-shadow: 0 0 10px var(--oro); } 50% { box-shadow: 0 0 25px var(--oro-luz), 0 0 40px var(--oro); } }

        /* TABS */
        .tabs { display: flex; padding: 0 20px; gap: 15px; margin-top: -20px; z-index: 10; }
        .tab { flex: 1; padding: 15px; border-radius: 18px; border: none; font-weight: 800; font-size: 11px; cursor: pointer; background: var(--crema); box-shadow: var(--f-fuera); color: #888; transition: 0.3s; }
        .tab.active { background: var(--v-club); color: var(--oro); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .container { padding: 30px 20px; flex: 1; }

        .card-label { font-size: 10px; font-weight: 900; color: #aa8507; text-transform: uppercase; margin-bottom: 12px; display: block; }

        /* INPUTS & BUTTONS */
        input, select { width: 100%; padding: 14px; border: none; border-radius: 15px; background: var(--crema); box-shadow: var(--f-dentro); margin-bottom: 12px; font-family: inherit; font-weight: 700; color: var(--v-club); outline: none; }
        .btn { width: 100%; padding: 16px; border-radius: 18px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; color: white; box-shadow: 4px 4px 10px rgba(0,0,0,0.2); transition: 0.2s; }
        .btn-oro { background: linear-gradient(145deg, var(--oro-luz), var(--oro)); }
        .btn-dark { background: var(--v-club); color: var(--oro); }
        .btn-green { background: #27ae60; margin-top: 20px; font-size: 16px; }
        .btn:active { transform: scale(0.97); }

        /* LISTA */
        .mov-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: white; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid var(--oro); }

        /* REPORTE BELLE VITA */
        #reporte-area { background-color: var(--crema); background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M60 20c10 20 40 20 40 60s-30 20-40 20-40-20-40-60 30-40 40-20z' fill='%23d4af37' fill-opacity='0.04'/%3E%3C/svg%3E"); padding: 30px; border: 2px solid var(--oro); border-radius: 10px; min-height: 600px; position: relative; }
        .rep-title { font-weight: 900; font-size: 11px; text-transform: uppercase; margin-bottom: 2px; }
        .rep-date { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--oro); font-style: italic; border-bottom: 1px solid rgba(212, 175, 55, 0.3); margin-bottom: 20px; padding-bottom: 5px; text-transform: capitalize; }
        .rep-flex { display: flex; gap: 15px; }
        .rep-table { flex: 1; }
        .rep-stats { width: 160px; text-align: right; }
        .t-head { display: flex; justify-content: space-between; border-bottom: 2px solid var(--oro); padding-bottom: 5px; font-size: 11px; font-weight: 900; margin-bottom: 5px; }
        .t-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(212, 175, 55, 0.1); font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .t-total { display: flex; justify-content: space-between; padding: 15px 0; border-top: 2px solid var(--oro); font-weight: 900; margin-top: 10px; font-size: 13px; }
        .rep-consumos { background: white; border-radius: 50px; padding: 5px 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; min-width: 140px; }
        .rep-c-num { background: #6b8e23; color: white; min-width: 45px; height: 45px; padding: 0 8px; display: flex; align-items: center; justify-content: center; border-radius: 25px; font-size: 18px; font-weight: 900; margin-left: 5px; }
        .stat-l { display: flex; justify-content: space-between; font-size: 11px; font-weight: 900; margin-bottom: 12px; border-bottom: 1px dashed #ddd; padding-bottom: 4px; }
        .s-rojo { color: var(--rojo); border-color: rgba(176, 58, 46, 0.2); }
        .s-verde { color: var(--verde); border-color: rgba(30, 132, 73, 0.2); }
        .rep-logo { width: 120px; height: 120px; background: white; border-radius: 50%; border: 4px solid var(--oro); margin: 30px auto 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .rep-logo img { width: 100%; height: 100%; object-fit: cover; }

        .hidden { display: none; }
        #toast { position: fixed; bottom: 30px; background: var(--v-club); color: var(--oro); padding: 12px 25px; border-radius: 50px; font-weight: 700; font-size: 12px; opacity: 0; transition: 0.5s; z-index: 1000; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <input type="file" id="upLogo" class="hidden" accept="image/*">
        <div class="logo-ring" onclick="document.getElementById('upLogo').click()">
            <img id="logoDisp" class="hidden">
            <b id="logoTxt">BV</b>
        </div>
        <h1>Belle Vita Club</h1>
    </div>

    <div class="tabs">
        <button class="tab active" id="tab-reg-btn" onclick="showView('reg')">OPERACIÓN</button>
        <button class="tab" id="tab-rep-btn" onclick="showView('rep')">REPORTES</button>
    </div>

    <!-- REGISTRO -->
    <div id="view-reg" class="container">
        <div class="card">
            <span class="card-label">📅 Fecha</span>
            <input type="date" id="inFecha">
        </div>
        <div class="card">
            <span class="card-label">🥤 Barra</span>
            <input id="inNombre" placeholder="Nombre Socio">
            <input type="number" id="inMonto" placeholder="Total $">
            <button class="btn btn-oro" onclick="add('normal')">Guardar Consumo</button>
        </div>
        <div class="card">
            <span class="card-label">📦 Producto Cerrado</span>
            <input id="inProd" placeholder="Producto">
            <input type="number" id="inMontoP" placeholder="Total $">
            <button class="btn btn-dark" onclick="add('cerrado')">Registrar Venta</button>
        </div>
        <span class="card-label">Hoy</span>
        <div id="lista"></div>
    </div>

    <!-- REPORTE -->
    <div id="view-rep" class="container hidden">
        <div class="card">
            <span class="card-label">Filtro de Periodo</span>
            <select id="selModo" onchange="calc()">
                <option value="dia">Reporte Diario</option>
                <option value="semana">Reporte Semanal (Vie-Jue)</option>
                <option value="mes">Reporte Mensual</option>
            </select>
            <input type="date" id="repRef" onchange="calc()">
        </div>

        <div id="reporte-area">
            <div id="rep-tit" class="rep-title">Reporte Diario</div>
            <div id="rep-fecha" class="rep-date">...</div>
            <div class="rep-flex">
                <div class="rep-table">
                    <div class="t-head"><span style="margin-left:20px">Nombre</span><span style="margin-right:15px">$</span></div>
                    <div id="rep-rows"></div>
                    <div class="t-total"><span style="margin-left:20px">TOTAL</span><span style="margin-right:15px" id="rep-t-barra">$0</span></div>
                </div>
                <div class="rep-stats">
                    <div class="rep-consumos"><span style="font-size:9px;font-weight:900;color:var(--oro)">CONSUMOS</span><span class="rep-c-num" id="rep-c-val">0</span></div>
                    <div class="stat-l"><span style="color:#aaa">P. Cerrado</span><span id="rep-v-cerrado">$0</span></div>
                    <div class="stat-l"><span style="color:#aaa">Vta Total</span><span id="rep-v-total">$0</span></div>
                    <div class="stat-l s-rojo"><span>SOBRE ROJO</span><span id="rep-v-rojo">$0</span></div>
                    <div class="stat-l s-verde"><span>SOBRE VERDE</span><span id="rep-v-verde">$0</span></div>
                    <div class="rep-logo"><img id="logoRep" class="hidden"><b id="logoRepTxt" style="font-size:35px;color:var(--oro)">BV</b></div>
                </div>
            </div>
        </div>
        <button class="btn btn-green" onclick="capturar()">📸 GENERAR TICKET WHATSAPP</button>
    </div>
</div>

<div id="toast"></div>

<script>
    let db = JSON.parse(localStorage.getItem('belle_final_v6')) || [];
    let logo = localStorage.getItem('belle_logo_v6') || null;

    const inFecha = document.getElementById('inFecha');
    const repRef = document.getElementById('repRef');
    const selModo = document.getElementById('selModo');

    window.onload = () => {
        const hoy = new Date().toISOString().split('T')[0];
        inFecha.value = hoy;
        repRef.value = hoy;
        if(logo) setLogo(logo);
        render();
    };

    document.getElementById('upLogo').onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                logo = ev.target.result;
                localStorage.setItem('belle_logo_v6', logo);
                setLogo(logo);
            };
            reader.readAsDataURL(file);
        }
    };

    function setLogo(url) {
        document.getElementById('logoDisp').src = url; document.getElementById('logoDisp').classList.remove('hidden');
        document.getElementById('logoTxt').classList.add('hidden');
        document.getElementById('logoRep').src = url; document.getElementById('logoRep').classList.remove('hidden');
        document.getElementById('logoRepTxt').classList.add('hidden');
    }

    function showView(v) {
        document.getElementById('view-reg').classList.toggle('hidden', v !== 'reg');
        document.getElementById('view-rep').classList.toggle('hidden', v !== 'rep');
        document.getElementById('tab-reg-btn').classList.toggle('active', v === 'reg');
        document.getElementById('tab-rep-btn').classList.toggle('active', v === 'rep');
        if(v === 'rep') calc();
    }

    function add(tipo) {
        let n, m;
        if(tipo === 'normal') {
            n = document.getElementById('inNombre').value || "Socio";
            m = parseFloat(document.getElementById('inMonto').value);
            document.getElementById('inNombre').value = ''; document.getElementById('inMonto').value = '';
        } else {
            n = document.getElementById('inProd').value || "Producto";
            m = parseFloat(document.getElementById('inMontoP').value);
            document.getElementById('inProd').value = ''; document.getElementById('inMontoP').value = '';
        }
        if(isNaN(m)) return;
        db.push({ id: Date.now(), fecha: inFecha.value, nombre: n, monto: m, tipo });
        localStorage.setItem('belle_final_v6', JSON.stringify(db));
        render();
        pop("✅ Guardado");
    }

    function del(id) {
        db = db.filter(i => i.id !== id);
        localStorage.setItem('belle_final_v6', JSON.stringify(db));
        render();
    }

    function render() {
        const list = document.getElementById('lista');
        const items = db.filter(d => d.fecha === inFecha.value);
        if(items.length === 0) { list.innerHTML = `<p style="text-align:center;color:#ccc;font-size:12px;">Sin ventas hoy</p>`; return; }
        list.innerHTML = items.map(i => `
            <div class="mov-item">
                <div><b>${i.tipo === 'cerrado' ? '📦' : '🥤'} ${i.nombre}</b><span>$ ${i.monto.toFixed(2)}</span></div>
                <button class="btn-del" onclick="del(${i.id})">QUITAR</button>
            </div>
        `).join('');
    }

    function calc() {
        const modo = selModo.value;
        const ref = repRef.value;
        const dRef = new Date(ref + 'T12:00:00');
        let filtrados = [];
        let t = "Reporte Diario", s = "";

        if(modo === 'dia') {
            filtrados = db.filter(d => d.fecha === ref);
            s = dRef.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        } else if(modo === 'semana') {
            let dia = dRef.getDay();
            let diffToFri = (dia >= 5) ? (dia - 5) : (dia + 2);
            let ini = new Date(dRef); ini.setDate(dRef.getDate() - diffToFri);
            let fin = new Date(ini); fin.setDate(ini.getDate() + 6);
            filtrados = db.filter(d => {
                let f = new Date(d.fecha + 'T12:00:00');
                return f >= ini && f <= fin;
            });
            t = "Reporte Semanal";
            s = `${ini.getDate()}/${ini.getMonth()+1} al ${fin.getDate()}/${fin.getMonth()+1}`;
        } else {
            filtrados = db.filter(d => {
                let f = new Date(d.fecha + 'T12:00:00');
                return f.getMonth() === dRef.getMonth() && f.getFullYear() === dRef.getFullYear();
            });
            t = "Reporte Mensual";
            s = dRef.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
        }

        const b = filtrados.filter(f => f.tipo === 'normal');
        const c = filtrados.filter(f => f.tipo === 'cerrado');
        const sb = b.reduce((a, x) => a + x.monto, 0);
        const sc = c.reduce((a, x) => a + x.monto, 0);
        const tot = sb + sc;

        document.getElementById('rep-tit').innerText = t;
        document.getElementById('rep-fecha').innerText = s;
        document.getElementById('rep-rows').innerHTML = b.map((i, index) => `
            <div class="t-row"><div style="display:flex;gap:10px"><span style="color:#bbb;width:15px;text-align:right">${index + 1}</span><span>${i.nombre}</span></div><div style="display:flex;gap:15px"><span>$</span><span style="width:35px;text-align:right">${i.monto}</span></div></div>
        `).join('');

        document.getElementById('rep-t-barra').innerText = `$ ${sb.toLocaleString()}`;
        document.getElementById('rep-c-val').innerText = (sb / 90).toFixed(2);
        document.getElementById('rep-v-cerrado').innerText = `$ ${sc.toLocaleString()}`;
        document.getElementById('rep-v-total').innerText = `$ ${tot.toLocaleString()}`;
        document.getElementById('rep-v-rojo').innerText = `$ ${(tot * 0.7).toFixed(2)}`;
        document.getElementById('rep-v-verde').innerText = `$ ${(tot * 0.3).toFixed(2)}`;
    }

    function capturar() {
        const a = document.getElementById('reporte-area');
        pop("Generando...");
        html2canvas(a, { scale: 3, backgroundColor: "#fdfaf5" }).then(c => {
            const l = document.createElement('a'); l.download = `Cierre_${Date.now()}.png`;
            l.href = c.toDataURL("image/png"); l.click();
            pop("📸 Guardado");
        });
    }

    function pop(m) {
        const t = document.getElementById('toast'); t.innerText = m; t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 2000);
    }
    inFecha.onchange = render;
</script>
</body>
</html>
