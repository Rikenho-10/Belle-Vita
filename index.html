<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:radial-gradient(circle,#0d0000,#000);
color:white;
}

/* TABS */
.tabs{display:flex;gap:5px;padding:10px;}
.tab{
flex:1;padding:8px;text-align:center;
border-radius:10px;
background:#111;
border:1px solid #500;
color:#ccc;
}
.active{
background:linear-gradient(45deg,#ffd700,#b8860b);
color:black;
box-shadow:0 0 10px gold;
}

/* LOGO */
.logo{
width:80px;
display:block;
margin:10px auto;
filter:drop-shadow(0 0 8px gold);
}

/* CARDS */
.card{
background:#111;
padding:10px;
margin:10px;
border-radius:12px;
border:1px solid #ffd700;
box-shadow:0 0 10px rgba(255,215,0,0.2);
}

/* INPUTS */
input,select{
width:95%;
padding:5px;
margin-top:4px;
border-radius:6px;
border:none;
background:#1a1a1a;
color:white;
font-size:12px;
}

/* BOTONES */
button{
width:100%;
padding:6px;
margin-top:5px;
border:none;
border-radius:8px;
font-weight:bold;
font-size:12px;
}
.red{background:#b30000;}
.gold{background:#ffd700;color:black;}
.green{background:#2ecc71;}
.del{
background:#333;
font-size:10px;
margin-top:2px;
}

/* LISTA */
.lista p{
margin:3px 0;
border-bottom:1px solid #333;
padding-bottom:3px;
}

/* CONSUMOS */
.consumos{
font-size:30px;
color:#ffd700;
text-align:center;
text-shadow:0 0 12px gold;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="tabs">
<div class="tab active" onclick="tab('reg')">Registro</div>
<div class="tab" onclick="tab('rep')">Reporte</div>
</div>

<img src="logo.png" class="logo">

<!-- REGISTRO -->
<div id="reg">

<div class="card">
<input type="date" id="fecha">
<input id="cliente" placeholder="Cliente">
<input id="total" placeholder="Total">
<button class="red" onclick="add()">Guardar</button>
</div>

<div class="card">
<input id="clienteC" placeholder="Cliente cerrado">
<input id="cerrado" placeholder="Monto">
<button class="gold" onclick="addCerrado()">Agregar</button>
</div>

<div class="card lista" id="lista"></div>

</div>

<!-- REPORTE -->
<div id="rep" class="hidden">

<div class="card">
<select id="tipo" onchange="generar()">
<option value="dia">Diario</option>
<option value="semana">Semanal</option>
<option value="mes">Mensual</option>
</select>

<input type="date" id="fechaRep" onchange="generar()">
<input type="month" id="mesRep" onchange="generar()">
</div>

<div class="card" id="reporte"></div>

<button class="green" onclick="descargar()">📸 Generar imagen</button>

</div>

<script>

let datos = JSON.parse(localStorage.getItem("datos")) || [];

/* FECHA */
function hoy(){
return new Date().toISOString().split("T")[0];
}

fecha.value = hoy();
fechaRep.value = hoy();

/* GUARDAR */
function save(){
localStorage.setItem("datos", JSON.stringify(datos));
}

/* TABS */
function tab(t){
reg.classList.toggle("hidden", t!="reg");
rep.classList.toggle("hidden", t!="rep");

document.querySelectorAll(".tab")[0].classList.toggle("active", t=="reg");
document.querySelectorAll(".tab")[1].classList.toggle("active", t=="rep");

if(t=="rep") generar();
}

/* AGREGAR */
function add(){
let f=fecha.value||hoy();
let c=cliente.value;
let t=parseFloat(total.value);
if(!t)return;

datos.push({id:Date.now(),fecha:f,cliente:c,total:t,tipo:"normal"});
save(); update();

cliente.value=""; total.value="";
}

function addCerrado(){
let f=fecha.value||hoy();
let c=clienteC.value||"Sin nombre";
let t=parseFloat(cerrado.value);
if(!t)return;

datos.push({id:Date.now(),fecha:f,cliente:c,total:t,tipo:"cerrado"});
save(); update();

clienteC.value=""; cerrado.value="";
}

/* ELIMINAR */
function borrar(id){
datos = datos.filter(d=>d.id!==id);
save(); update();
}

/* LISTA */
function update(){
let f=fecha.value||hoy();
let html="";

datos.forEach(d=>{
if(d.fecha==f){
html+=`
<p>
${d.cliente||"—"} - $${d.total} (${d.tipo})
<br><button class="del" onclick="borrar(${d.id})">Eliminar</button>
</p>`;
}
});

lista.innerHTML=html;
}

/* SEMANA */
function semana(fecha){
let d=new Date(fecha);
let dia=d.getDay();
let diff=(dia>=5)?dia-5:dia+2;
let inicio=new Date(d);
inicio.setDate(d.getDate()-diff);

let fin=new Date(inicio);
fin.setDate(inicio.getDate()+6);

return {inicio,fin};
}

/* REPORTE */
function generar(){

let tipo=tipo.value;
let f=fechaRep.value||hoy();

let ventas=0,cerrado=0;
let listaC="",listaCe="";

datos.forEach(d=>{

let fd=new Date(d.fecha);
let incluir=false;

if(tipo=="dia") incluir=d.fecha==f;

if(tipo=="semana"){
let {inicio,fin}=semana(f);
incluir=fd>=inicio && fd<=fin;
}

if(tipo=="mes" && mesRep.value){
let [y,m]=mesRep.value.split("-");
incluir=(fd.getFullYear()==y && (fd.getMonth()+1)==m);
}

if(incluir){

if(d.tipo=="normal"){
ventas+=d.total;
listaC+=`<p>🥤 ${d.cliente} - $${d.total}</p>`;
}

if(d.tipo=="cerrado"){
cerrado+=d.total;
listaCe+=`<p>📦 ${d.cliente} - $${d.total}</p>`;
}

}

});

let total=ventas+cerrado;
let rojo=(total*0.7).toFixed(2);
let verde=(total*0.3).toFixed(2);
let consumos=(ventas/90).toFixed(2);

reporte.innerHTML=`
<div class="consumos">${consumos} 🥤</div>

<p>💰 Total: $${total}</p>
<p>🥤 Ventas: $${ventas}</p>
<p>📦 Cerrado: $${cerrado}</p>

<p>🔴 $${rojo}</p>
<p>🟢 $${verde}</p>

<hr>
${listaC}
${listaCe}
`;
}

/* IMAGEN (FIX ANDROID) */
function descargar(){

html2canvas(reporte,{
backgroundColor:null,
scale:2,
useCORS:true
}).then(canvas=>{
let link=document.createElement("a");
link.download="reporte.png";
link.href=canvas.toDataURL("image/png");
link.click();
});

}

update();

</script>

</body>
</html>
