<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Belle Vita Elite</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: url('https://images.unsplash.com/photo-1582582429416-9a5c5d3b0a5d') no-repeat center/cover;
}
.overlay {
  background: rgba(0,40,30,0.85);
}
.card {
  background: rgba(0,0,0,0.7);
  border-radius: 12px;
}
.gold { color:#d4af37; }
</style>
</head>

<body class="overlay text-white p-4">

<h1 class="text-center text-4xl font-bold gold mb-4">BELLE VITA</h1>

<div class="grid md:grid-cols-2 gap-4">

<!-- TABLA -->
<div class="card p-4">

<h2 class="mb-2">Clientes</h2>

<input id="nombre" placeholder="Nombre" class="text-black p-1 mr-2">
<input id="monto" type="number" placeholder="$" class="text-black p-1">

<button onclick="agregar()" class="bg-green-600 px-3 py-1 mt-2">Agregar</button>

<table class="w-full mt-4 text-sm">
<thead>
<tr class="border-b">
<th>#</th><th>Nombre</th><th>$</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<p class="mt-2 text-right">Total: $<span id="total"></span></p>

</div>

<!-- PANEL -->
<div class="grid gap-4">

<div class="card p-4 text-center">
<h2 class="gold">CONSUMOS</h2>
<p class="text-6xl text-green-400" id="consumos"></p>
</div>

<div class="card p-4">

<p>Producto cerrado: 
<input id="producto" type="number" class="text-black w-24" oninput="render()">
</p>

<p class="mt-2">Venta total: $<span id="ventaTotal"></span></p>

<p class="text-red-400">Rojo: $<span id="rojo"></span></p>
<p class="text-green-400">Verde: $<span id="verde"></span></p>

</div>

<div class="card p-4">

<p>Tarjeta: <input id="tarjeta" type="number" class="text-black w-24" oninput="render()"></p>
<p>Pendiente: <input id="pendiente" type="number" class="text-black w-24" oninput="render()"></p>
<p>Gastos: <input id="gastos" type="number" class="text-black w-24" oninput="render()"></p>

<p class="text-yellow-300 text-xl mt-2">
Efectivo: $<span id="efectivo"></span>
</p>

</div>

<button onclick="generarImagen()" class="bg-purple-600 p-2 rounded">
Generar Imagen
</button>

</div>

</div>

<canvas id="canvas" width="700" height="900" class="hidden"></canvas>

<script>
let clientes=[];

function agregar(){
  const n=nombre.value;
  const m=parseFloat(monto.value);
  if(!n||!m)return;

  clientes.push({nombre:n,monto:m});
  render();
}

function render(){
  tabla.innerHTML="";

  clientes.forEach((c,i)=>{
    tabla.innerHTML+=`
    <tr class="border-b">
      <td>${i+1}</td>
      <td>${c.nombre}</td>
      <td>$${c.monto}</td>
    </tr>`;
  });

  calcular();
}

function calcular(){
  const producto=parseFloat(producto.value)||0;
  const tarjeta=parseFloat(tarjeta.value)||0;
  const pendiente=parseFloat(pendiente.value)||0;
  const gastos=parseFloat(gastos.value)||0;

  const ventaDia=clientes.reduce((a,c)=>a+c.monto,0);
  const ventaTotal=ventaDia+producto;

  const consumos=ventaDia/90;
  const rojo=ventaTotal*0.7;
  const verde=ventaTotal*0.3;
  const efectivo=ventaTotal-tarjeta-pendiente-gastos;

  total.innerText=ventaDia.toFixed(2);
  consumosEl.innerText=consumos.toFixed(2);
  ventaTotalEl.innerText=ventaTotal.toFixed(2);
  rojoEl.innerText=rojo.toFixed(2);
  verdeEl.innerText=verde.toFixed(2);
  efectivoEl.innerText=efectivo.toFixed(2);

  window.data={consumos,ventaTotal,rojo,verde};
}

function generarImagen(){
  const c=canvas;
  const ctx=c.getContext("2d");

  ctx.fillStyle="#022c22";
  ctx.fillRect(0,0,700,900);

  ctx.fillStyle="#d4af37";
  ctx.font="bold 40px Arial";
  ctx.textAlign="center";
  ctx.fillText("BELLE VITA",350,80);

  ctx.fillStyle="#22c55e";
  ctx.font="bold 70px Arial";
  ctx.fillText(window.data.consumos.toFixed(2),350,200);

  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("CONSUMOS",350,250);

  ctx.fillText("Venta total: $" + window.data.ventaTotal.toFixed(2),350,350);

  ctx.fillStyle="#ef4444";
  ctx.fillText("Rojo: $" + window.data.rojo.toFixed(2),350,420);

  ctx.fillStyle="#22c55e";
  ctx.fillText("Verde: $" + window.data.verde.toFixed(2),350,460);

  const link=document.createElement("a");
  link.download="reporte.png";
  link.href=c.toDataURL();
  link.click();
}

const consumosEl=document.getElementById("consumos");
const ventaTotalEl=document.getElementById("ventaTotal");
const rojoEl=document.getElementById("rojo");
const verdeEl=document.getElementById("verde");
const efectivoEl=document.getElementById("efectivo");

render();
</script>

</body>
</html>
