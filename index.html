<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belle Vita PRO</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:radial-gradient(circle,#1a1a1a,#000);
color:white;
}

.tabs{display:flex;gap:5px;padding:10px;}
.tab{
flex:1;padding:8px;text-align:center;
border-radius:10px;background:#111;
border:1px solid gold;
}
.active{background:gold;color:black;}

.logo{
width:90px;display:block;margin:10px auto;
}

.card{
background:#111;padding:10px;
margin:10px;border-radius:12px;
border:1px solid gold;
}

input,select{
width:92%;
padding:6px;margin-top:5px;
border-radius:6px;border:none;
background:#222;color:white;
font-size:13px;
}

button{
width:100%;padding:7px;margin-top:6px;
border:none;border-radius:8px;
font-weight:bold;
}
.red{background:#ff2e2e;}
.gold{background:gold;color:black;}
.green{background:#2ecc71;}
.del{background:#555;font-size:11px;}

.lista p{
margin:3px 0;
border-bottom:1px solid #333;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="tabs">
<div class="tab active" onclick="tab('reg')">Registro</div>
<div class="tab" onclick="tab('rep')">Reporte</div>
</div>

<img src="logo.png" class="logo">

<!-- REGISTRO -->
<div id="reg">

<div class="card">
<input type="date" id="fecha">
<input id="cliente" placeholder="Cliente">
<input id="total" placeholder="Total $">
<button class="red" onclick="add()">Guardar</button>
</div>

<div class="card">
<input id="clienteC" placeholder="Cliente cerrado">
<input id="cerrado" placeholder="Monto">
<button class="gold" onclick="addCerrado()">Agregar</button>
</div>

<div class="card lista" id="lista"></div>

</div>

<!-- REPORTE -->
<div id="rep" class="hidden">

<div class="card">
<h3>Reporte del día</h3>
</div>

<div class="card" id="reporte"></div>

<button class="green" onclick="whatsapp()">Enviar a WhatsApp</button>

</div>

<script>

let datos = JSON.parse(localStorage.getItem("datos")) || [];

function save(){
localStorage.setItem("datos", JSON.stringify(datos));
}

function hoy(){
return new Date().toISOString().split("T")[0];
}

fecha.value = hoy();

/* TABS */
function tab(t){
reg.classList.toggle("hidden", t!="reg");
rep.classList.toggle("hidden", t!="rep");

document.querySelectorAll(".tab")[0].classList.toggle("active", t=="reg");
document.querySelectorAll(".tab")[1].classList.toggle("active", t=="rep");

if(t=="rep") generar();
}

/* AGREGAR */
function add(){
let f = fecha.value || hoy();
let c = cliente.value;
let t = parseFloat(total.value);
if(!t) return;

datos.push({fecha:f, cliente:c, total:t, tipo:"normal"});
save();
update();

cliente.value="";
total.value="";
}

function addCerrado(){
let f = fecha.value || hoy();
let c = clienteC.value || "Sin nombre";
let t = parseFloat(cerrado.value);
if(!t) return;

datos.push({fecha:f, cliente:c, total:t, tipo:"cerrado"});
save();
update();

clienteC.value="";
cerrado.value="";
}

/* ELIMINAR */
function borrar(i){
datos.splice(i,1);
save();
update();
}

/* LISTA */
function update(){
let f = fecha.value || hoy();
let html="";

datos.forEach((d,i)=>{
if(d.fecha==f){
html+=`
<p>
${d.cliente||"—"} - $${d.total} (${d.tipo})
<br><button class="del" onclick="borrar(${i})">Eliminar</button>
</p>`;
}
});

lista.innerHTML = html;
}

/* REPORTE */
function generar(){

let f = hoy();

let ventas=0;
let cerrado=0;

let listaClientes="";
let listaCerrados="";

datos.forEach(d=>{
if(d.fecha==f){

if(d.tipo=="normal"){
ventas+=d.total;
listaClientes+=`<p>🥤 ${d.cliente} - $${d.total}</p>`;
}

if(d.tipo=="cerrado"){
cerrado+=d.total;
listaCerrados+=`<p>📦 ${d.cliente} - $${d.total}</p>`;
}

}
});

let total = ventas + cerrado;

let rojo = (total * 0.7).toFixed(2);
let verde = (total * 0.3).toFixed(2);

reporte.innerHTML=`
<h3>📊 REPORTE</h3>

<p>💰 Total: $${total}</p>
<p>🥤 Ventas: $${ventas}</p>
<p>📦 Cerrado: $${cerrado}</p>

<p>🔴 Rojo: $${rojo}</p>
<p>🟢 Verde: $${verde}</p>

<hr>

<h4>Clientes</h4>
${listaClientes}

<h4>Cerrados</h4>
${listaCerrados}
`;
}

/* WHATSAPP */
function whatsapp(){

let f = hoy();

let ventas=0;
let cerrado=0;

let listaClientes="";
let listaCerrados="";

datos.forEach(d=>{
if(d.fecha==f){

if(d.tipo=="normal"){
ventas+=d.total;
listaClientes+=`<p>🥤 ${d.cliente} - $${d.total}</p>`;
}

if(d.tipo=="cerrado"){
cerrado+=d.total;
listaCerrados+=`<p>📦 ${d.cliente} - $${d.total}</p>`;
}

}
});

let total = ventas + cerrado;

let rojo = (total * 0.7).toFixed(2);
let verde = (total * 0.3).toFixed(2);

let div=document.createElement("div");

div.style.padding="20px";
div.style.background="#000";
div.style.color="white";
div.style.textAlign="center";
div.style.borderRadius="20px";
div.style.border="2px solid gold";

/* 🌹 ROSAS */
div.style.backgroundImage=`
radial-gradient(circle at 20% 20%, rgba(255,0,80,0.2), transparent 40%),
radial-gradient(circle at 80% 80%, rgba(255,0,80,0.15), transparent 40%)
`;

div.innerHTML=`
<img src="logo.png" style="width:80px"><br>

<h2 style="color:gold;">BELLE VITA</h2>
<h3>${f}</h3>

<p>💰 Total: $${total}</p>
<p>🥤 Ventas: $${ventas}</p>
<p>📦 Cerrado: $${cerrado}</p>

<p>🔴 $${rojo}</p>
<p>🟢 $${verde}</p>

<hr>

<div style="text-align:left">
${listaClientes}
${listaCerrados}
</div>
`;

html2canvas(div).then(canvas=>{
let url=canvas.toDataURL("image/png");

let link=document.createElement("a");
link.href=url;
link.download="reporte.png";
link.click();

window.open("https://wa.me/");
});
}

update();

</script>

</body>
</html>
