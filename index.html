<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belle Vita PRO</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:radial-gradient(circle,#1a1a1a,#000);
color:#fff;
}

/* TABS */
.tabs{display:flex;gap:5px;padding:10px;}
.tab{
flex:1;
padding:8px;
text-align:center;
border-radius:10px;
background:#111;
border:1px solid gold;
}
.active{background:linear-gradient(gold,#5a3d00);color:#000;}

/* LOGO */
.logo{
width:100px;
display:block;
margin:10px auto;
}

/* CARDS */
.card{
background:rgba(0,0,0,0.7);
border:1px solid gold;
border-radius:15px;
padding:10px;
margin:10px;
box-shadow:0 0 10px gold;
}

/* INPUTS */
input{
width:95%;
padding:6px;
margin-top:5px;
border-radius:6px;
border:none;
background:#222;
color:white;
font-size:13px;
}

/* BOTONES */
button{
width:100%;
padding:7px;
margin-top:6px;
border:none;
border-radius:8px;
font-weight:bold;
}
.red{background:#ff2e2e;}
.gold{background:gold;color:black;}
.green{background:#2ecc71;}

/* LISTA */
.lista p{
margin:3px 0;
border-bottom:1px solid #333;
padding:3px;
}

/* HIDDEN */
.hidden{display:none;}
</style>
</head>

<body>

<div class="tabs">
<div class="tab active" onclick="tab('reg')">Registro</div>
<div class="tab" onclick="tab('rep')">Reporte</div>
</div>

<img id="logo" class="logo">

<!-- REGISTRO -->
<div id="reg">

<div class="card">
<h3>Registrar venta</h3>
<input id="cliente" placeholder="Cliente">
<input id="total" placeholder="Total $">
<button class="red" onclick="add()">Guardar</button>
</div>

<div class="card">
<h3>Producto cerrado</h3>
<input id="clienteC" placeholder="Cliente">
<input id="cerrado" placeholder="Monto $">
<button class="gold" onclick="addCerrado()">Agregar</button>
</div>

<div class="card lista" id="lista"></div>

</div>

<!-- REPORTE -->
<div id="rep" class="hidden">

<div class="card">
<h3>Seleccionar reporte</h3>
<select id="tipoRep" onchange="generar()">
<option value="dia">Día</option>
<option value="semana">Semana</option>
<option value="mes">Mes</option>
</select>
</div>

<div class="card" id="reporte"></div>

<button class="green" onclick="whatsapp()">Enviar a WhatsApp</button>

</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
let datos = JSON.parse(localStorage.getItem("datos"))||[];

function save(){
localStorage.setItem("datos",JSON.stringify(datos));
}

function hoy(){
return new Date().toISOString().split("T")[0];
}

function tab(t){
reg.classList.toggle("hidden",t!="reg");
rep.classList.toggle("hidden",t!="rep");

document.querySelectorAll(".tab")[0].classList.toggle("active",t=="reg");
document.querySelectorAll(".tab")[1].classList.toggle("active",t=="rep");

if(t=="rep") generar();
}

function add(){
let c=cliente.value;
let t=parseFloat(total.value);
if(!t)return;

datos.push({fecha:hoy(),cliente:c,total:t,tipo:"normal"});
save();
update();

cliente.value="";
total.value="";
}

function addCerrado(){
let c=clienteC.value;
let t=parseFloat(cerrado.value);
if(!t)return;

datos.push({fecha:hoy(),cliente:c,total:t,tipo:"cerrado"});
save();
update();

clienteC.value="";
cerrado.value="";
}

function update(){
let html="";
datos.filter(d=>d.fecha==hoy()).forEach(d=>{
html+=`<p>${d.cliente||"—"} - $${d.total} (${d.tipo})</p>`;
});
lista.innerHTML=html;
}

function generar(){
let tipo=tipoRep.value;
let h=0,c=0;
let listaClientes="";

datos.forEach(d=>{
if(d.fecha==hoy()){
if(d.tipo=="normal"){
h+=d.total;
listaClientes+=`<p>${d.cliente} - $${d.total}</p>`;
}else{
c+=d.total;
}
}
});

reporte.innerHTML=`
<h3>Reporte ${tipo}</h3>
<p>💰 Ventas: $${h}</p>
<p>📦 Producto cerrado: $${c}</p>
<h4>Clientes:</h4>
${listaClientes}
`;
}

function whatsapp(){

let div=document.createElement("div");

div.style.padding="20px";
div.style.background="radial-gradient(#111,#000)";
div.style.color="white";
div.style.textAlign="center";
div.style.borderRadius="20px";
div.style.border="2px solid gold";

/* ROSAS SUTIL */
div.style.backgroundImage="radial-gradient(circle at 20% 20%, rgba(255,0,80,0.15), transparent 40%), radial-gradient(circle at 80% 80%, rgba(255,0,80,0.1), transparent 40%)";

let h=0,c=0;

datos.forEach(d=>{
if(d.fecha==hoy()){
if(d.tipo=="normal") h+=d.total;
else c+=d.total;
}
});

div.innerHTML=`
<img src="${logo.src}" style="width:80px"><br>
<h2>BELLE VITA</h2>
<h3>${hoy()}</h3>

<p>💰 Ventas: $${h}</p>
<p>📦 Cerrado: $${c}</p>
`;

html2canvas(div).then(canvas=>{
let link=document.createElement("a");
link.href=canvas.toDataURL();
link.download="reporte.png";
link.click();

window.open("https://wa.me/");
});
}

/* LOGO LOCAL */
logo.src="logo.png";

update();
</script>

</body>
</html>
