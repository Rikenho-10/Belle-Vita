<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Belle Vita Reporte</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-950 text-white p-4 text-center">

<h1 class="text-3xl font-bold mb-4">BELLE VITA</h1>

<input id="ventaDia" type="number" placeholder="Venta del día" class="text-black p-1 m-1">
<input id="producto" type="number" placeholder="Producto cerrado" class="text-black p-1 m-1">

<br>

<button onclick="calcular()" class="bg-green-500 px-4 py-2 m-2">Calcular</button>
<button onclick="generarImagen()" class="bg-purple-500 px-4 py-2 m-2">Generar Imagen</button>

<div class="mt-4">
  <p>Consumos: <span id="consumos"></span></p>
  <p>Venta total: $<span id="ventaTotal"></span></p>
  <p class="text-red-400">Rojo: $<span id="rojo"></span></p>
  <p class="text-green-400">Verde: $<span id="verde"></span></p>
</div>

<canvas id="canvas" width="600" height="800" class="hidden"></canvas>

<script>

let datos={};

function calcular(){
  const ventaDia=parseFloat(document.getElementById("ventaDia").value)||0;
  const producto=parseFloat(document.getElementById("producto").value)||0;

  const ventaTotal=ventaDia+producto;
  const consumos=ventaDia/90;
  const rojo=ventaTotal*0.7;
  const verde=ventaTotal*0.3;

  datos={ventaDia,producto,ventaTotal,consumos,rojo,verde};

  document.getElementById("consumos").innerText=consumos.toFixed(2);
  document.getElementById("ventaTotal").innerText=ventaTotal.toFixed(2);
  document.getElementById("rojo").innerText=rojo.toFixed(2);
  document.getElementById("verde").innerText=verde.toFixed(2);
}

function generarImagen(){
  const c=document.getElementById("canvas");
  const ctx=c.getContext("2d");

  // Fondo
  ctx.fillStyle="#022c22";
  ctx.fillRect(0,0,600,800);

  // Título
  ctx.fillStyle="#d4af37";
  ctx.font="bold 40px Arial";
  ctx.textAlign="center";
  ctx.fillText("BELLE VITA",300,80);

  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("Club de Nutrición",300,120);

  // Caja consumos
  ctx.fillStyle="#065f46";
  ctx.fillRect(100,160,400,150);

  ctx.fillStyle="#22c55e";
  ctx.font="bold 60px Arial";
  ctx.fillText(datos.consumos.toFixed(2),300,250);

  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("CONSUMOS",300,290);

  // Datos
  ctx.font="24px Arial";

  ctx.fillText("Venta del día: $" + datos.ventaDia.toFixed(2),300,380);
  ctx.fillText("Producto cerrado: $" + datos.producto.toFixed(2),300,420);
  ctx.fillText("Venta total: $" + datos.ventaTotal.toFixed(2),300,460);

  // Rojo / Verde
  ctx.fillStyle="#ef4444";
  ctx.fillText("Rojo: $" + datos.rojo.toFixed(2),300,540);

  ctx.fillStyle="#22c55e";
  ctx.fillText("Verde: $" + datos.verde.toFixed(2),300,580);

  // Fecha
  ctx.fillStyle="white";
  ctx.font="18px Arial";
  const fecha=new Date().toLocaleDateString();
  ctx.fillText(fecha,300,700);

  // Descargar
  const img=c.toDataURL();
  const link=document.createElement("a");
  link.download="reporte_belle_vita.png";
  link.href=img;
  link.click();
}

</script>

</body>
</html>
