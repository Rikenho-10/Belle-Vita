<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belle Vita</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:radial-gradient(circle at top,#1a1a1a,#000);
color:white;
}

/* CONTENEDOR */
.app{
max-width:360px;
margin:auto;
padding:10px;
}

/* TABS */
.tabs{
display:flex;
gap:6px;
}
.tab{
flex:1;
padding:8px;
text-align:center;
border-radius:10px;
background:#111;
border:1px solid #333;
font-size:13px;
}
.tab.active{
background:linear-gradient(#ff3c3c,#7a0000);
box-shadow:0 0 8px rgba(255,0,0,.6);
}

/* LOGO */
.logo{
width:110px;
height:110px;
object-fit:contain;
display:block;
margin:12px auto;
border-radius:50%;
box-shadow:0 0 12px gold;
cursor:pointer;
}

/* CARDS */
.card{
background:linear-gradient(145deg,#111,#1a1a1a);
padding:10px;
border-radius:10px;
margin-top:8px;
border:1px solid gold;
box-shadow:0 0 8px rgba(255,215,0,.2);
}

/* INPUTS MÁS COMPACTOS */
input{
width:100%;
padding:6px;
margin-top:5px;
border-radius:6px;
border:none;
background:#222;
color:white;
font-size:13px;
}

/* BOTONES */
button{
width:100%;
padding:7px;
margin-top:6px;
border:none;
border-radius:7px;
font-weight:bold;
font-size:13px;
}

.btn-red{background:#e60000;}
.btn-gold{background:gold;color:black;}
.btn-green{background:#2ecc71;}

.lista p{
margin:3px 0;
padding:3px 0;
border-bottom:1px solid #333;
font-size:13px;
}

.hidden{display:none;}

.flyer{
text-align:center;
padding:12px;
border-radius:12px;
background:black;
border:1px solid gold;
box-shadow:0 0 15px rgba(255,215,0,.4);
}
</style>
</head>

<body>

<div class="app">

<!-- TABS -->
<div class="tabs">
<div class="tab active" onclick="tab('reg')">Registro</div>
<div class="tab" onclick="tab('rep')">Reporte</div>
</div>

<!-- LOGO (CLICK PARA CAMBIAR) -->
<img id="logo" class="logo">
<input type="file" id="fileLogo" accept="image/*" hidden>

<!-- REGISTRO -->
<div id="reg">

<div class="card">
<input id="fecha" type="date">
<input id="cliente" placeholder="Cliente">
<input id="total" type="number" placeholder="Total $">
<button class="btn-red" onclick="add()">Guardar</button>
</div>

<div class="card">
<input id="cerrado" type="number" placeholder="Producto cerrado">
<button class="btn-red" onclick="addCerrado()">Agregar</button>
</div>

<div class="card">
<h4>Clientes del día</h4>
<div id="lista" class="lista"></div>
</div>

</div>

<!-- REPORTE -->
<div id="rep" class="hidden">

<div class="card">
<input id="filtro" type="date" onchange="generar()">
</div>

<div id="reporte" class="card flyer"></div>

<button class="btn-gold" onclick="generar()">Actualizar</button>
<button class="btn-green" onclick="capturar()">📸 Imagen</button>

</div>

</div>

<script>

let datos = JSON.parse(localStorage.getItem("datos")) || [];

/* LOGO */
let logo = document.getElementById("logo");
let fileLogo = document.getElementById("fileLogo");

logo.onclick = ()=> fileLogo.click();

fileLogo.onchange = e=>{
let reader = new FileReader();
reader.onload = ()=>{
localStorage.setItem("logo", reader.result);
logo.src = reader.result;
};
reader.readAsDataURL(e.target.files[0]);
};

let savedLogo = localStorage.getItem("logo");
logo.src = savedLogo ? savedLogo : "logo.png";

/* STORAGE */
function save(){
localStorage.setItem("datos", JSON.stringify(datos));
}

function hoy(){
return new Date().toISOString().split("T")[0];
}

/* TABS */
function tab(t){
reg.classList.toggle("hidden", t!="reg");
rep.classList.toggle("hidden", t!="rep");

document.querySelectorAll(".tab")[0].classList.toggle("active", t=="reg");
document.querySelectorAll(".tab")[1].classList.toggle("active", t=="rep");

if(t=="rep") generar();
}

/* AGREGAR */
function add(){
let f = fecha.value || hoy();
let c = cliente.value;
let t = parseFloat(total.value);
if(!t) return;

datos.push({fecha:f, cliente:c, total:t, tipo:"normal"});
save();
update();

cliente.value="";
total.value="";
}

/* CERRADO */
function addCerrado(){
let f = fecha.value || hoy();
let m = parseFloat(cerrado.value);
if(!m) return;

datos.push({fecha:f, total:m, tipo:"cerrado"});
save();
update();

cerrado.value="";
}

/* LISTA */
function update(){
let html="";
let fSel = fecha.value || hoy();

datos.forEach(d=>{
if(d.fecha === fSel){
if(d.tipo==="normal") html+=`<p>🥤 ${d.cliente} - $${d.total}</p>`;
if(d.tipo==="cerrado") html+=`<p>📦 $${d.total}</p>`;
}
});

lista.innerHTML = html;
}

/* REPORTE */
function generar(){
let fSel = filtro.value || hoy();
let total = 0;

datos.forEach(d=>{
if(d.fecha === fSel && d.tipo==="normal"){
total += d.total;
}
});

let consumos = (total/90).toFixed(2);
let rojo = (total*0.7).toFixed(2);
let verde = (total*0.3).toFixed(2);

reporte.innerHTML = `
<h2 style="color:gold;">BELLE VITA</h2>
<p>${fSel}</p>

<h1 style="color:gold;">$${total}</h1>

<p>🥤 ${consumos} consumos</p>

<hr>

<p>🔴 $${rojo}</p>
<p>🟢 $${verde}</p>
`;
}

/* IMAGEN */
function capturar(){
html2canvas(reporte).then(canvas=>{
let link = document.createElement("a");
link.download="reporte.png";
link.href=canvas.toDataURL();
link.click();
});
}

/* INIT */
fecha.value = hoy();
filtro.value = hoy();
update();

</script>

</body>
</html>
