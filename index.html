<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Belle Vita App</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-950 text-white">

<!-- NAV -->
<div class="flex justify-center gap-4 p-4 bg-black">
  <button onclick="mostrar('registro')" class="bg-green-600 px-4 py-2">Registro</button>
  <button onclick="mostrar('reporte')" class="bg-purple-600 px-4 py-2">Reporte</button>
</div>

<!-- REGISTRO -->
<div id="registro" class="p-4">

<h2 class="text-xl mb-2">Clientes</h2>

<input id="nombre" placeholder="Nombre" class="text-black p-1">
<input id="monto" type="number" placeholder="$" class="text-black p-1">

<button onclick="agregar()" class="bg-green-500 px-3 py-1">Agregar</button>

<ul id="lista" class="mt-4"></ul>

<div class="mt-4">
Producto cerrado:
<input id="producto" type="number" class="text-black" oninput="guardar()">
</div>

</div>

<!-- REPORTE -->
<div id="reporte" class="hidden p-4 text-center">

<h1 class="text-3xl">BELLE VITA</h1>

<p class="text-6xl text-green-400" id="consumos"></p>

<p>Venta total: $<span id="ventaTotal"></span></p>
<p class="text-red-400">Rojo: $<span id="rojo"></span></p>
<p class="text-green-400">Verde: $<span id="verde"></span></p>

<button onclick="generarImagen()" class="bg-purple-500 px-4 py-2 mt-3">
Generar Imagen
</button>

</div>

<script>
let clientes=[];

function mostrar(tab){
  registro.classList.add("hidden");
  reporte.classList.add("hidden");

  document.getElementById(tab).classList.remove("hidden");

  if(tab==="reporte") calcular();
}

function agregar(){
  const n=nombre.value;
  const m=parseFloat(monto.value);
  if(!n||!m)return;

  clientes.push({nombre:n,monto:m});
  render();
}

function render(){
  lista.innerHTML="";
  clientes.forEach(c=>{
    lista.innerHTML+=`<li>${c.nombre} - $${c.monto}</li>`;
  });
}

function calcular(){
  const producto=parseFloat(producto.value)||0;
  const ventaDia=clientes.reduce((a,c)=>a+c.monto,0);

  const ventaTotal=ventaDia+producto;
  const consumos=ventaDia/90;
  const rojo=ventaTotal*0.7;
  const verde=ventaTotal*0.3;

  consumosEl.innerText=consumos.toFixed(2);
  ventaTotalEl.innerText=ventaTotal.toFixed(2);
  rojoEl.innerText=rojo.toFixed(2);
  verdeEl.innerText=verde.toFixed(2);
}

const consumosEl=document.getElementById("consumos");
const ventaTotalEl=document.getElementById("ventaTotal");
const rojoEl=document.getElementById("rojo");
const verdeEl=document.getElementById("verde");
</script>

</body>
</html>
