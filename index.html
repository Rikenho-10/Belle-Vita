<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belle Vita - Master Stable</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        :root {
            --emerald: #0b1f15;
            --gold: #c5a059;
            --gold-light: #e4c68d;
            --paper: #fdfaf5;
            --rojo: #b03a2e;
            --verde: #1e8449;
            --shadow-out: 5px 5px 12px #050d09, -2px -2px 10px rgba(255,255,255,0.05);
            --shadow-in: inset 3px 3px 6px rgba(0,0,0,0.6), inset -2px -2px 5px rgba(255,255,255,0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; font-family: 'Montserrat', sans-serif; 
            background: var(--emerald); color: white; 
            display: flex; justify-content: center; min-height: 100vh;
        }

        .app-container { width: 100%; max-width: 480px; display: flex; flex-direction: column; background: var(--emerald); }

        /* HEADER & NEON */
        .header { padding: 25px 15px; text-align: center; background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent); }
        .logo-neon { 
            width: 70px; height: 70px; background: white; margin: 0 auto 10px; 
            border-radius: 50%; border: 2px solid var(--gold); 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            box-shadow: 0 0 15px var(--gold); cursor: pointer;
            animation: pulse-gold 2s infinite ease-in-out;
        }
        @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 10px var(--gold); } 50% { box-shadow: 0 0 25px var(--gold-light); } }
        .logo-neon img { width: 100%; height: 100%; object-fit: cover; }
        .logo-neon b { font-size: 24px; color: var(--emerald); }
        .header h1 { font-family: 'Playfair Display', serif; color: var(--gold); margin: 0; font-size: 22px; letter-spacing: 3px; text-transform: uppercase; }

        /* TABS */
        .nav-tabs { display: flex; padding: 0 20px; gap: 15px; margin-top: -15px; position: relative; z-index: 10; }
        .tab-item { 
            flex: 1; padding: 15px; border-radius: 15px; border: 1px solid var(--gold); 
            font-weight: 800; font-size: 11px; cursor: pointer; text-align: center;
            background: rgba(11, 31, 21, 0.9); color: var(--gold); transition: 0.3s;
        }
        .tab-item.active { background: var(--gold); color: var(--emerald); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }

        .view-content { padding: 30px 20px; flex: 1; }
        .lux-card { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(197, 160, 89, 0.1); }
        .card-lbl { font-size: 10px; font-weight: 900; color: var(--gold); text-transform: uppercase; margin-bottom: 12px; display: block; letter-spacing: 1.5px; }

        /* INPUTS HUNDIDOS */
        input, select { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; 
            background: rgba(0,0,0,0.2); color: white; margin-bottom: 15px;
            box-shadow: var(--shadow-in); font-family: inherit; font-weight: 600;
        }

        /* BOTONES BISELADOS */
        .btn-lux { 
            width: 100%; padding: 16px; border-radius: 12px; border: none; 
            font-weight: 900; text-transform: uppercase; cursor: pointer; 
            transition: 0.2s; letter-spacing: 1px;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.5);
        }
        .btn-gold { background: linear-gradient(135deg, var(--gold-light), var(--gold)); color: var(--emerald); }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .btn-green { background: var(--verde); color: white; margin-top: 20px; }
        .btn-lux:active { transform: scale(0.97); }

        /* LOG */
        .log-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 8px; border-left: 3px solid var(--gold); }
        .log-row b { font-size: 13px; color: var(--gold-light); }
        .btn-del { background: rgba(176, 58, 46, 0.2); color: #ff4d4d; border: none; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; cursor: pointer; }

        /* REPORTE CANVAS (PARA IMAGEN) */
        #reporte-canvas {
            width: 800px; height: 1150px; background: var(--emerald);
            padding: 40px; position: relative; color: white; display: flex; flex-direction: column;
            overflow: hidden; border: 2px solid var(--gold);
        }
        
        .rep-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; position: relative; z-index: 2; }
        .rep-logo-box { display: flex; align-items: center; gap: 15px; }
        .rep-logo-circle { width: 100px; height: 100px; border: 3px solid var(--gold); border-radius: 50%; background: white; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .rep-logo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .rep-club-name h2 { font-family: 'Playfair Display', serif; font-size: 42px; margin: 0; color: white; letter-spacing: 2px; }
        .rep-club-name p { color: var(--gold); font-size: 11px; text-transform: uppercase; margin: 0; letter-spacing: 3px; }

        .rep-date-tag { border: 2px solid var(--gold); padding: 12px 25px; text-align: center; border-radius: 15px; background: rgba(0,0,0,0.3); }
        .rep-date-day { font-size: 40px; font-weight: 900; line-height: 1; }
        .rep-date-month { font-size: 12px; color: var(--gold); text-transform: uppercase; font-weight: 800; margin-top: 5px; }

        .rep-body { display: flex; gap: 30px; flex: 1; position: relative; z-index: 2; }
        .rep-left { flex: 1.2; }
        .rep-right { flex: 0.8; display: flex; flex-direction: column; gap: 15px; }

        .rep-table { width: 100%; border-collapse: separate; border-spacing: 0 4px; background: var(--paper); border-radius: 12px; border: 3px solid var(--gold); overflow: hidden; }
        .rep-table th { background: var(--emerald); color: var(--gold); padding: 12px; font-size: 14px; text-transform: uppercase; }
        .rep-table td { padding: 10px 15px; color: var(--emerald); font-weight: 700; font-size: 17px; border-bottom: 1px solid rgba(0,0,0,0.05); }

        .exec-box { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(255,255,255,0.03); border: 2px solid var(--gold); border-radius: 30px; text-align: center; padding: 20px; }
        .exec-lbl { font-size: 18px; color: var(--gold); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 10px; }
        .exec-val { font-size: 95px; font-weight: 900; color: white; }

        /* Badge Consumos adaptable */
        .rep-badge-cons { background: rgba(0,0,0,0.5); border: 1px solid var(--gold); border-radius: 60px; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .rep-badge-cons-lbl { font-size: 14px; color: var(--gold); text-transform: uppercase; font-weight: 800; margin-right: 15px; }
        .rep-badge-cons-num { background: var(--verde); color: white; min-width: 55px; height: 55px; padding: 0 12px; display: flex; align-items: center; justify-content: center; border-radius: 30px; font-size: 24px; font-weight: 900; }

        .rep-stat-card { background: var(--paper); color: var(--emerald); border-radius: 15px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-left: 8px solid var(--gold); }
        .rep-stat-card.rojo { border-left-color: var(--rojo); color: var(--rojo); }
        .rep-stat-card.verde { border-left-color: var(--verde); color: var(--verde); }
        .rep-stat-lbl { font-size: 12px; font-weight: 900; text-transform: uppercase; color: #888; }
        .rep-stat-val { font-size: 26px; font-weight: 900; }

        .rep-footer { margin-top: 30px; text-align: center; border-top: 1px solid rgba(197,160,89,0.3); padding-top: 20px; }
        .rep-footer p { font-family: 'Playfair Display', serif; font-style: italic; font-size: 22px; margin: 0; color: white; }

        .hidden { display: none !important; }
        #toast { position: fixed; bottom: 30px; background: var(--gold); color: var(--emerald); padding: 12px 25px; border-radius: 50px; font-weight: 900; font-size: 13px; opacity: 0; transition: 0.5s; z-index: 1000; pointer-events: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <input type="file" id="logoUpload" class="hidden" accept="image/*">
        <div class="logo-neon" onclick="document.getElementById('logoUpload').click()">
            <img id="uiLogo" class="hidden">
            <b id="uiLogoDef">BV</b>
        </div>
        <h1>Belle Vita</h1>
    </div>

    <div class="nav-tabs">
        <div class="tab-item active" id="tab-o" onclick="cambiarVista('reg')">OPERACIÓN</div>
        <div class="tab-item" id="tab-r" onclick="cambiarVista('rep')">REPORTES</div>
    </div>

    <!-- REGISTRO -->
    <div id="view-reg" class="view-content">
        <div class="lux-card">
            <span class="card-lbl">📅 Fecha</span>
            <input type="date" id="regFecha">
        </div>
        <div class="lux-card">
            <span class="card-lbl">🥤 Barra</span>
            <input type="text" id="regNom" placeholder="Nombre Socio">
            <input type="number" id="regMon" placeholder="Monto $">
            <button class="btn-lux btn-gold" onclick="guardarDato('normal')">Añadir a Barra</button>
        </div>
        <div class="lux-card">
            <span class="card-lbl">📦 Cerrado</span>
            <input type="text" id="regCerrNom" placeholder="Producto">
            <input type="number" id="regCerrMon" placeholder="Monto $">
            <button class="btn-lux btn-outline" onclick="guardarDato('cerrado')">Registrar Venta</button>
        </div>
        <span class="card-lbl">Movimientos de hoy</span>
        <div id="listaMovimientos"></div>
    </div>

    <!-- REPORTES -->
    <div id="view-rep" class="view-content hidden">
        <div class="lux-card">
            <span class="card-lbl">Tipo de Reporte</span>
            <select id="selPeriodo" onchange="actualizarFiltros()">
                <option value="dia">Reporte Diario</option>
                <option value="semana">Semana (Vie-Jue)</option>
                <option value="mes">Reporte Mensual</option>
                <option value="rango">Rango Libre</option>
            </select>
            <div id="div-simple">
                <input type="date" id="fRef" onchange="generarCalculos()">
            </div>
            <div id="div-rango" class="hidden">
                <input type="date" id="fDe" onchange="generarCalculos()">
                <input type="date" id="fA" onchange="generarCalculos()">
            </div>
        </div>

        <!-- CANVAS PARA WHATSAPP (OCULTO) -->
        <div style="position: absolute; top: -10000px; left: -10000px;">
            <div id="reporte-canvas">
                <div class="rep-header">
                    <div class="rep-logo-box">
                        <div class="rep-logo-circle">
                            <img id="canLogo" class="hidden">
                            <b id="canLogoDef" style="font-size: 50px; color: #c5a059;">BV</b>
                        </div>
                        <div class="rep-club-name">
                            <h2>BELLE VITA</h2>
                            <p>Premium Nutrition Club</p>
                        </div>
                    </div>
                    <div class="rep-date-tag">
                        <div class="rep-date-day" id="c-dia-n">21</div>
                        <div class="rep-date-month" id="c-dia-t">Martes, Abril 2026</div>
                    </div>
                </div>

                <div class="rep-body">
                    <div class="rep-left" id="c-dinamico">
                        <!-- Tabla o Promedio -->
                    </div>
                    <div class="rep-right">
                        <div class="rep-badge-cons">
                            <span class="rep-badge-cons-lbl" id="c-lbl-c">Consumos</span>
                            <span class="rep-badge-cons-num" id="c-val-c">0.00</span>
                        </div>
                        <div class="rep-stat-card"><div class="rep-stat-info"><span class="rep-stat-lbl">P. Cerrado</span><div class="rep-stat-val" id="c-v-c">$0</div></div></div>
                        <div class="rep-stat-card"><div class="rep-stat-info"><span class="rep-stat-lbl">Venta Total</span><div class="rep-stat-val" id="c-v-t">$0</div></div></div>
                        <div class="rep-stat-card rojo"><div class="rep-stat-info"><span class="rep-stat-lbl" style="color:inherit">Rojo</span><div class="rep-stat-val" id="c-v-r">$0</div></div></div>
                        <div class="rep-stat-card verde"><div class="rep-stat-info"><span class="rep-stat-lbl" style="color:inherit">Verde</span><div class="rep-stat-val" id="c-v-v">$0</div></div></div>
                    </div>
                </div>
                <div class="rep-footer"><p>Belle Vita, el poder de tu transformación.</p></div>
            </div>
        </div>

        <button class="btn-lux btn-green" onclick="descargarImagen()">📸 GENERAR IMAGEN PARA WHATSAPP</button>
    </div>
</div>

<div id="toast"></div>

<script>
    // Almacenamiento Seguro
    let dataLocal = JSON.parse(localStorage.getItem('bv_master_stable_v1')) || [];
    let logoLocal = localStorage.getItem('bv_logo_v11') || null;

    const regFecha = document.getElementById('regFecha');
    const fRef = document.getElementById('fRef');
    const selPeriodo = document.getElementById('selPeriodo');

    window.onload = () => {
        const t = new Date().toISOString().split('T')[0];
        regFecha.value = t; fRef.value = t;
        document.getElementById('fDe').value = t;
        document.getElementById('fA').value = t;
        if(logoLocal) setLogo(logoLocal);
        mostrarLista();
    };

    // --- LOGO ---
    document.getElementById('logoUpload').onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                logoLocal = ev.target.result;
                localStorage.setItem('bv_logo_v11', logoLocal);
                setLogo(logoLocal);
            };
            reader.readAsDataURL(file);
        }
    };

    function setLogo(url) {
        document.getElementById('uiLogo').src = url; document.getElementById('uiLogo').classList.remove('hidden');
        document.getElementById('uiLogoDef').classList.add('hidden');
        document.getElementById('canLogo').src = url; document.getElementById('canLogo').classList.remove('hidden');
        document.getElementById('canLogoDef').classList.add('hidden');
    }

    // --- NAVEGACION ---
    function cambiarVista(v) {
        document.getElementById('view-reg').classList.toggle('hidden', v !== 'reg');
        document.getElementById('view-rep').classList.toggle('hidden', v !== 'rep');
        document.getElementById('tab-o').classList.toggle('active', v === 'reg');
        document.getElementById('tab-r').classList.toggle('active', v === 'rep');
        if(v === 'rep') generarCalculos();
    }

    // --- GUARDADO ---
    function guardarDato(tipo) {
        let n, m;
        if(tipo === 'normal') {
            n = document.getElementById('regNom').value || "Socio";
            m = parseFloat(document.getElementById('regMon').value);
            document.getElementById('regNom').value = ''; document.getElementById('regMon').value = '';
        } else {
            n = document.getElementById('regCerrNom').value || "Venta";
            m = parseFloat(document.getElementById('regCerrMon').value);
            document.getElementById('regCerrNom').value = ''; document.getElementById('regCerrMon').value = '';
        }
        if(isNaN(m)) { msg("Ingresa un monto válido"); return; }
        
        dataLocal.push({ id: Date.now(), fecha: regFecha.value, nombre: n, monto: m, tipo: tipo });
        localStorage.setItem('bv_master_stable_v1', JSON.stringify(dataLocal));
        mostrarLista();
        msg("✅ Guardado");
    }

    function borrarDato(id) {
        dataLocal = dataLocal.filter(i => i.id !== id);
        localStorage.setItem('bv_master_stable_v1', JSON.stringify(dataLocal));
        mostrarLista();
    }

    function mostrarLista() {
        const list = document.getElementById('listaMovimientos');
        const hoy = regFecha.value;
        const filtrados = dataLocal.filter(d => d.fecha === hoy);
        if(filtrados.length === 0) { list.innerHTML = `<p style="text-align:center; color:#555; font-size:12px;">Sin registros hoy</p>`; return; }
        list.innerHTML = filtrados.map(i => `
            <div class="log-row">
                <div><b>${i.tipo === 'cerrado' ? '📦' : '🥤'} ${i.nombre}</b><br><small>$${i.monto.toFixed(2)}</small></div>
                <button class="btn-del" onclick="borrarDato(${i.id})">QUITAR</button>
            </div>
        `).join('');
    }

    // --- REPORTES ---
    function actualizarFiltros() {
        const m = selPeriodo.value;
        document.getElementById('div-simple').classList.toggle('hidden', m === 'rango');
        document.getElementById('div-rango').classList.toggle('hidden', m !== 'rango');
        generarCalculos();
    }

    function generarCalculos() {
        const modo = selPeriodo.value;
        let finalData = [];
        let dI, dF;
        let setDias = new Set();

        if(modo === 'rango') {
            dI = new Date(document.getElementById('fDe').value + 'T12:00:00');
            dF = new Date(document.getElementById('fA').value + 'T12:00:00');
            finalData = dataLocal.filter(d => {
                let f = new Date(d.fecha + 'T12:00:00');
                if(f >= dI && f <= dF) {
                    if(d.tipo === 'normal') setDias.add(d.fecha);
                    return true;
                }
                return false;
            });
        } else {
            const r = fRef.value;
            const dR = new Date(r + 'T12:00:00');
            if(modo === 'dia') {
                finalData = dataLocal.filter(d => d.fecha === r);
                dI = dR; dF = dR;
            } else if(modo === 'semana') {
                let dia = dR.getDay();
                let diff = (dia >= 5) ? (dia - 5) : (dia + 2);
                dI = new Date(dR); dI.setDate(dR.getDate() - diff);
                dF = new Date(dI); dF.setDate(dI.getDate() + 6);
                finalData = dataLocal.filter(d => {
                    let f = new Date(d.fecha + 'T12:00:00');
                    if(f >= dI && f <= dF) {
                        if(d.tipo === 'normal') setDias.add(d.fecha);
                        return true;
                    }
                    return false;
                });
            } else {
                finalData = dataLocal.filter(d => {
                    let f = new Date(d.fecha + 'T12:00:00');
                    if(f.getMonth() === dR.getMonth() && f.getFullYear() === dR.getFullYear()) {
                        if(d.tipo === 'normal') setDias.add(d.fecha);
                        return true;
                    }
                    return false;
                });
                dI = new Date(dR
