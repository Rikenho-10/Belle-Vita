<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belle Vita Premium - Ricardo</title>
    <!-- Librería para el Flyer de WhatsApp -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        :root {
            --emerald: #0b1f15;
            --gold: #c5a059;
            --gold-light: #e4c68d;
            --paper: #fdfaf5;
            --rojo: #b03a2e;
            --verde: #1e8449;
            --sh-in: inset 4px 4px 8px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--emerald); color: white; display: flex; justify-content: center; min-height: 100vh; }
        .app-shell { width: 100%; max-width: 480px; background: var(--emerald); display: flex; flex-direction: column; }

        /* HEADER */
        .header { padding: 30px 15px; text-align: center; }
        .logo-box { 
            width: 85px; height: 85px; background: white; margin: 0 auto 12px; 
            border-radius: 50%; border: 3px solid var(--gold); 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            box-shadow: 0 0 20px var(--gold); cursor: pointer;
            animation: pulse-gold 2s infinite;
        }
        @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 10px var(--gold); } 50% { box-shadow: 0 0 30px var(--gold-light); } }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .logo-box b { font-size: 30px; color: var(--emerald); }
        .header h1 { font-family: 'Playfair Display', serif; color: var(--gold); margin: 0; font-size: 26px; letter-spacing: 4px; text-transform: uppercase; }

        /* TABS */
        .tabs { display: flex; padding: 0 20px; gap: 10px; margin-top: -15px; }
        .tab-btn { 
            flex: 1; padding: 16px; border-radius: 12px; border: 1px solid var(--gold); 
            font-weight: 900; font-size: 11px; cursor: pointer; text-align: center;
            background: rgba(0,0,0,0.5); color: var(--gold); transition: 0.3s;
        }
        .tab-btn.active { background: var(--gold); color: var(--emerald); }

        /* VIEWS */
        .view { padding: 25px 20px; flex: 1; }
        .lux-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 22px; margin-bottom: 25px; border: 1px solid rgba(197, 160, 89, 0.2); }
        .lux-lbl { font-size: 10px; font-weight: 900; color: var(--gold); text-transform: uppercase; margin-bottom: 12px; display: block; letter-spacing: 2px; }
        
        input, select { 
            width: 100%; padding: 15px; border: none; border-radius: 12px; 
            background: rgba(0,0,0,0.4); color: white; margin-bottom: 15px;
            box-shadow: var(--sh-in); font-family: inherit; font-weight: 600; font-size: 14px;
        }

        .btn-action { 
            width: 100%; padding: 18px; border-radius: 15px; border: none; 
            font-weight: 900; text-transform: uppercase; cursor: pointer; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.4); transition: 0.2s;
            letter-spacing: 1px;
        }
        .btn-gold { background: linear-gradient(135deg, var(--gold-light), var(--gold)); color: var(--emerald); }
        .btn-dark { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .btn-green { background: var(--verde); color: white; margin-top: 25px; font-size: 16px; }
        .btn-action:active { transform: scale(0.97); opacity: 0.9; }

        .log-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 15px; margin-bottom: 10px; border-left: 5px solid var(--gold); }
        .log-row b { font-size: 14px; color: var(--gold-light); }
        .btn-del { background: rgba(176, 58, 46, 0.3); color: #ff6b6b; border: none; padding: 8px 12px; border-radius: 10px; font-size: 10px; font-weight: 900; }

        /* REPORTE PARA WHATSAPP (CANVAS) */
        #reporte-export {
            width: 800px; 
            min-height: 1100px; /* Altura dinámica */
            background: var(--emerald);
            padding: 50px; position: relative; color: white; display: flex; flex-direction: column;
            border: 2px solid var(--gold); overflow: hidden;
        }
        .c-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
        .c-logo-group { display: flex; align-items: center; gap: 25px; }
        .c-logo-circle { width: 140px; height: 140px; border: 4px solid var(--gold); border-radius: 50%; background: white; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px var(--gold); }
        .c-logo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .c-club-text h2 { font-family: 'Playfair Display', serif; font-size: 50px; margin: 0; letter-spacing: 3px; }
        .c-club-text p { color: var(--gold); font-size: 14px; text-transform: uppercase; margin: 0; letter-spacing: 5px; }

        .c-date-box { border: 2.5px solid var(--gold); padding: 15px 30px; text-align: center; border-radius: 15px; background: rgba(0,0,0,0.4); }
        .c-date-n { font-size: 55px; font-weight: 900; line-height: 1; }
        .c-date-t { font-size: 16px; color: var(--gold); text-transform: uppercase; font-weight: 800; margin-top: 8px; }

        .c-main { display: flex; gap: 40px; flex: 1; }
        .c-left-col { flex: 1.3; }
        .c-right-col { flex: 0.7; display: flex; flex-direction: column; gap: 25px; }

        .c-table { width: 100%; border-collapse: separate; border-spacing: 0 6px; background: var(--paper); border-radius: 15px; border: 4px solid var(--gold); }
        .c-table th { background: var(--emerald); color: var(--gold); padding: 15px; font-size: 18px; text-transform: uppercase; text-align: center; }
        .c-table td { padding: 14px 20px; color: var(--emerald); font-weight: 800; font-size: 20px; border-bottom: 1px solid rgba(0,0,0,0.05); }

        .c-exec-box { height: 100%; min-height: 400px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(255,255,255,0.03); border: 2.5px solid var(--gold); border-radius: 40px; text-align: center; padding: 40px; }
        .c-exec-lbl { font-size: 24px; color: var(--gold); text-transform: uppercase; letter-spacing: 6px; margin-bottom: 15px; }
        .c-exec-val { font-size: 110px; font-weight: 900; color: white; text-shadow: 0 0 30px var(--gold); }

        .c-badge-pill { background: rgba(0,0,0,0.6); border: 2px solid var(--gold); border-radius: 70px; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .c-badge-lbl { font-size: 18px; color: var(--gold); text-transform: uppercase; font-weight: 800; font-family: 'Playfair Display'; }
        .c-badge-num { background: var(--verde); color: white; min-width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; border-radius: 40px; font-size: 30px; font-weight: 900; }

        .c-stat-card { background: var(--paper); color: var(--emerald); border-radius: 20px; padding: 22px 30px; display: flex; justify-content: space-between; align-items: center; border-left: 12px solid var(--gold); }
        .c-stat-card.rojo { border-left-color: var(--rojo); color: var(--rojo); }
        .c-stat-card.verde { border-left-color: var(--verde); color: var(--verde); }
        .c-stat-val { font-size: 36px; font-weight: 900; }

        .c-footer { margin-top: 50px; text-align: center; border-top: 2px solid rgba(197,160,89,0.3); padding-top: 40px; font-family: 'Playfair Display', serif; font-style: italic; font-size: 32px; }

        .hidden { display: none !important; }
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--gold); color: var(--emerald); padding: 15px 35px; border-radius: 50px; font-weight: 900; opacity: 0; transition: 0.5s; z-index: 9999; border: 2px solid white; }
    </style>
</head>
<body>

<div class="app-shell">
    <!-- UI HEADER -->
    <div class="header">
        <input type="file" id="logo-pick" class="hidden" accept="image/*">
        <div class="logo-box" id="logo-trigger">
            <img id="ui-img" class="hidden">
            <b id="ui-txt">BV</b>
        </div>
        <h1>Belle Vita</h1>
    </div>

    <!-- UI TABS -->
    <div class="tabs">
        <button class="tab-btn active" id="btn-o" onclick="navegar('oper')">REGISTRO</button>
        <button class="tab-btn" id="btn-r" onclick="navegar('repo')">REPORTES</button>
    </div>

    <!-- VISTA OPERACIÓN -->
    <div id="v-oper" class="view">
        <div class="lux-card">
            <span class="lux-lbl">📅 Día de Registro</span>
            <input type="date" id="fecha-app">
        </div>
        <div class="lux-card">
            <span class="lux-lbl">🥤 Consumo Barra (Socio)</span>
            <input type="text" id="nom-s" placeholder="Nombre">
            <input type="number" id="mon-s" placeholder="Monto $">
            <button class="btn-action btn-gold" onclick="agregar('normal')">Añadir Consumo</button>
        </div>
        <div class="lux-card">
            <span class="lux-lbl">📦 Venta de Producto</span>
            <input type="text" id="nom-p" placeholder="Producto">
            <input type="number" id="mon-p" placeholder="Monto $">
            <button class="btn-action btn-dark" onclick="agregar('cerrado')">Registrar Venta</button>
        </div>
        <span class="lux-lbl">Actividad del Día</span>
        <div id="lista-bit"></div>
    </div>

    <!-- VISTA REPORTE -->
    <div id="v-repo" class="view hidden">
        <div class="lux-card">
            <span class="lux-lbl">Filtro de Cierre</span>
            <select id="sel-periodo" onchange="runCalculos()">
                <option value="dia">Reporte Diario (Lista Completa)</option>
                <option value="semana">Semanal (Vie-Jue)</option>
                <option value="mes">Reporte Mensual</option>
                <option value="rango">Rango Libre</option>
            </select>
            <div id="f-simple">
                <input type="date" id="f-ref" onchange="runCalculos()">
            </div>
            <div id="f-rango" class="hidden">
                <input type="date" id="f-de" onchange="runCalculos()">
                <input type="date" id="f-a" onchange="runCalculos()">
            </div>
        </div>

        <!-- AREA DE CAPTURA (Oculta) -->
        <div style="position: absolute; top: -20000px; left: -20000px; width: 800px;">
            <div id="reporte-export">
                <div class="c-header">
                    <div class="c-logo-group">
                        <div class="c-logo-circle">
                            <img id="can-img" class="hidden">
                            <b id="can-txt" style="font-size: 65px; color: #c5a059;">BV</b>
                        </div>
                        <div class="c-club-text">
                            <h2>BELLE VITA</h2>
                            <p>Luxury Nutrition Experience</p>
                        </div>
                    </div>
                    <div class="c-date-box">
                        <div class="c-date-n" id="c-dia">21</div>
                        <div class="c-date-t" id="c-mes">Abril, 2026</div>
                    </div>
                </div>
                <div class="c-main">
                    <div class="c-left-col" id="c-dinamico"></div>
                    <div class="c-right-col">
                        <div class="c-badge-pill">
                            <span class="c-badge-lbl" id="c-lbl">Consumos</span>
                            <span class="c-badge-num" id="c-consumos">0</span>
                        </div>
                        <div class="c-stat-card"><span>P. Cerrado</span><div class="c-stat-val" id="c-cerrado">$0</div></div>
                        <div class="c-stat-card"><span>Vta Total</span><div class="c-stat-val" id="c-total">$0</div></div>
                        <div class="c-stat-card rojo"><span>Rojo</span><div class="c-stat-val" id="c-rojo">$0</div></div>
                        <div class="c-stat-card verde"><span>Verde</span><div class="c-stat-val" id="c-verde">$0</div></div>
                    </div>
                </div>
                <div class="c-footer">Tu cambio comienza aquí. Belle Vita.</div>
            </div>
        </div>
        <button class="btn-action btn-green" onclick="generarFlyer()">📸 GENERAR FLYER PARA WHATSAPP</button>
    </div>
</div>

<div id="toast"></div>

<script>
    // --- MOTOR BLINDADO ---
    var database = JSON.parse(localStorage.getItem('bv_luxury_final_v52')) || [];
    var logo_url = localStorage.getItem('bv_logo_v52') || null;

    window.onload = function() {
        var h = new Date().toISOString().split('T')[0];
        document.getElementById('fecha-app').value = h;
        document.getElementById('f-ref').value = h;
        document.getElementById('f-de').value = h;
        document.getElementById('f-a').value = h;
        if(logo_url) applyLogo(logo_url);
        renderLog();
        document.getElementById('logo-trigger').onclick = function() { document.getElementById('logo-pick').click(); };
    };

    function applyLogo(u) {
        document.getElementById('ui-img').src = u; document.getElementById('ui-img').classList.remove('hidden');
        document.getElementById('ui-txt').classList.add('hidden');
        document.getElementById('can-img').src = u; document.getElementById('can-img').classList.remove('hidden');
        document.getElementById('can-txt').classList.add('hidden');
    }

    document.getElementById('logo-pick').onchange = function(e) {
        var f = e.target.files[0];
        if(f) {
            var reader = new FileReader();
            reader.onload = function(ev) {
                logo_url = ev.target.result;
                localStorage.setItem('bv_logo_v52', logo_url);
                applyLogo(logo_url);
            };
            reader.readAsDataURL(f);
        }
    };

    function navegar(s) {
        document.getElementById('v-oper').classList.toggle('hidden', s !== 'oper');
        document.getElementById('v-repo').classList.toggle('hidden', s !== 'repo');
        document.getElementById('btn-o').classList.toggle('active', s === 'oper');
        document.getElementById('btn-r').classList.toggle('active', s === 'repo');
        if(s === 'repo') runCalculos();
    }

    function agregar(tipo) {
        var n, m, f = document.getElementById('fecha-app').value;
        if(tipo === 'normal') {
            n = document.getElementById('nom-s').value || "Socio";
            m = parseFloat(document.getElementById('mon-s').value);
            document.getElementById('nom-s').value = ''; document.getElementById('mon-s').value = '';
        } else {
            n = document.getElementById('nom-p').value || "Venta";
            m = parseFloat(document.getElementById('mon-p').value);
            document.getElementById('nom-p').value = ''; document.getElementById('mon-p').value = '';
        }
        if(isNaN(m)) return;
        database.push({ id: Date.now(), fecha: f, nombre: n, monto: m, tipo: tipo });
        localStorage.setItem('bv_luxury_final_v52', JSON.stringify(database));
        renderLog();
        popToast("✅ Registrado");
    }

    function borrar(id) {
        database = database.filter(function(i) { return i.id !== id; });
        localStorage.setItem('bv_luxury_final_v52', JSON.stringify(database));
        renderLog();
    }

    function renderLog() {
        var b = document.getElementById('lista-bit');
        var hoy = document.getElementById('fecha-app').value;
        var f = database.filter(function(d) { return d.fecha === hoy; });
        if(f.length === 0) { b.innerHTML = '<p style="text-align:center;color:#555;font-size:12px;">Sin ventas</p>'; return; }
        b.innerHTML = f.map(function(i) {
            return '<div class="log-row"><div><b>' + (i.tipo === 'cerrado' ? '📦' : '🥤') + ' ' + i.nombre + '</b><br><small>$' + i.monto.toFixed(2) + '</small></div><button class="btn-del" onclick="borrar(' + i.id + ')">X</button></div>';
        }).join('');
    }

    function runCalculos() {
        var m = document.getElementById('sel-periodo').value;
        document.getElementById('f-simple').classList.toggle('hidden', m === 'rango');
        document.getElementById('f-rango').classList.toggle('hidden', m !== 'rango');

        var res = [], dI, dF, setD = new Set();
        if(m === 'rango') {
            dI = new Date(document.getElementById('rango-de').value + 'T12:00:00');
            dF = new Date(document.getElementById('rango-a').value + 'T12:00:00');
            res = database.filter(function(d) {
                var f = new Date(d.fecha + 'T12:00:00');
                if(f >= dI && f <= dF) { if(d.tipo === 'normal') setD.add(d.fecha); return true; }
                return false;
            });
        } else {
            var r = document.getElementById('f-ref').value;
            var dR = new Date(r + 'T12:00:00');
            if(m === 'dia') { res = database.filter(function(d) { return d.fecha === r; }); dI = dR; dF = dR; }
            else if(m === 'semana') {
                var dia = dR.getDay();
                var diff = (dia >= 5) ? (dia - 5) : (dia + 2);
                dI = new Date(dR); dI.setDate(dR.getDate() - diff);
                dF = new Date(dI); dF.setDate(dI.getDate() + 6);
                res = database.filter(function(d) {
                    var f = new Date(d.fecha + 'T12:00:00');
                    if(f >= dI && f <= dF) { if(d.tipo === 'normal') setD.add(d.fecha); return true; }
                    return false;
                });
            } else {
                res = database.filter(function(d) {
                    var f = new Date(d.fecha + 'T12:00:00');
                    if(f.getMonth() === dR.getMonth() && f.getFullYear() === dR.getFullYear()) { if(d.tipo === 'normal') setD.add(d.fecha); return true; }
                    return false;
                });
                dI = new Date(dR.getFullYear(), dR.getMonth(), 1);
                dF = new Date(dR.getFullYear(), dR.getMonth() + 1, 0);
            }
        }

        var barra = res.filter(function(f) { return f.tipo === 'normal'; });
        var totB = barra.reduce(function(a, x) { return a + x.monto; }, 0);
        var totC = res.filter(function(f) { return f.tipo === 'cerrado'; }).reduce(function(a, x) { return a + x.monto; }, 0);
        var total = totB + totC;
        var cons = totB / 90;
        var avg = (cons / (setD.size || 1)).toFixed(2);

        document.getElementById('c-dia').innerText = dI.getDate();
        document.getElementById('c-mes').innerText = dI.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
        document.getElementById('c-lbl').innerText = m === 'dia' ? 'Consumos' : 'Promedio';
        document.getElementById('c-consumos').innerText = m === 'dia' ? cons.toFixed(2) : avg;
        document.getElementById('c-cerrado').innerText = '$' + totC.toLocaleString();
        document.getElementById('c-total').innerText = '$' + total.toLocaleString();
        document.getElementById('c-rojo').innerText = '$' + (total * 0.7).toLocaleString();
        document.getElementById('c-verde').innerText = '$' + (total * 0.3).toLocaleString();

        var boxIz = document.getElementById('c-dinamico');
        if(m === 'dia') {
            var t = '<table class="c-table"><thead><tr><th>#</th><th style="text-align:left">Socio</th><th style="text-align:right">$</th></tr></thead><tbody>';
            barra.forEach(function(i, idx) { t += '<tr><td style="text-align:center;color:#888;">' + (idx+1) + '</td><td>' + i.nombre + '</td><td style="text-align:right">' + i.monto + '</td></tr>'; });
            boxIz.innerHTML = t + '</tbody></table>';
        } else {
            boxIz.innerHTML = '<div class="c-exec-box"><span class="c-exec-lbl">Consumos Totales</span><div class="c-exec-val">' + cons.toFixed(2) + '</div><span class="c-exec-lbl">Acumulado</span></div>';
        }
    }

    function generarFlyer() {
        runCalculos();
        popToast("📸 Capturando Flyer Luxury...");
        setTimeout(function() {
            html2canvas(document.getElementById('reporte-export'), { scale: 3, backgroundColor: "#0b1f15" }).then(function(c) {
                var l = document.createElement('a');
                l.download = 'BelleVita_Reporte.png';
                l.href = c.toDataURL('image/png');
                l.click();
                popToast("✅ Flyer Guardado");
            });
        }, 700);
    }

    function popToast(m) {
        var t = document.getElementById('toast'); t.innerText = m; t.style.opacity = 1;
        setTimeout(function() { t.style.opacity = 0; }, 3000);
    }
</script>
</body>
</html>
