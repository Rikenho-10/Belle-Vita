<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Belle Vita</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

/* FONDO */
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
color:white;
background:
radial-gradient(circle at top, rgba(255,215,0,0.12), transparent 40%),
#000;
}

/* APP */
.app{
max-width:380px;
margin:auto;
padding:12px;
}

/* TABS */
.tabs{
display:flex;
gap:8px;
margin-bottom:10px;
}

.tab{
flex:1;
padding:10px;
text-align:center;
border-radius:10px;
background:#111;
border:1px solid #333;
font-size:14px;
}

.tab.active{
background:linear-gradient(#ff3c3c,#7a0000);
box-shadow:0 0 8px red;
}

/* LOGO */
.logo{
width:110px;
height:110px;
object-fit:cover;
display:block;
margin:10px auto;
border-radius:50%;
border:2px solid gold;
box-shadow:0 0 12px gold;
}

/* CARD */
.card{
background:#0d0d0d;
border-radius:16px;
padding:12px;
margin-top:12px;
border:1px solid rgba(255,215,0,0.5);
box-shadow:
inset 0 0 10px rgba(255,215,0,0.1),
0 0 10px rgba(255,215,0,0.15);
}

/* INPUTS FINOS */
input{
width:100%;
padding:8px;
margin-top:6px;
border-radius:8px;
border:1px solid #333;
background:#1a1a1a;
color:white;
font-size:14px;
}

/* BOTONES */
button{
width:100%;
padding:9px;
margin-top:8px;
border:none;
border-radius:8px;
font-weight:bold;
font-size:14px;
}

.btn-red{
background:linear-gradient(#ff3c3c,#7a0000);
}

.btn-green{
background:linear-gradient(#2ecc71,#145a32);
}

.btn-gold{
background:linear-gradient(#ffd700,#996600);
color:black;
}

/* TEXTO */
.big{
font-size:28px;
text-align:center;
color:gold;
text-shadow:0 0 8px gold;
}

.lista p{
border-bottom:1px solid #333;
padding:5px 0;
font-size:14px;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="app">

<div class="tabs">
<div class="tab active" onclick="tab('reg')">Registro</div>
<div class="tab" onclick="tab('rep')">Reporte</div>
</div>

<img class="logo" src="logo.png">

<!-- REGISTRO -->
<div id="reg">

<div class="card">
<input id="fecha" type="date">
<input id="cliente" placeholder="Cliente">
<input id="total" type="number" placeholder="Total $">
<button class="btn-red" onclick="add()">Guardar</button>
</div>

<div class="card">
<input id="cerrado" type="number" placeholder="Producto cerrado">
<button class="btn-red" onclick="addCerrado()">Agregar</button>
</div>

<div class="card">
<h3>Clientes del día</h3>
<div id="lista" class="lista"></div>
</div>

</div>

<!-- REPORTE -->
<div id="rep" class="hidden">

<div id="reporte" class="card"></div>

<button class="btn-gold" onclick="generar()">Actualizar</button>
<button class="btn-green" onclick="capturar()">📸 Imagen</button>
<button class="btn-green" onclick="whatsapp()">📤 WhatsApp</button>

</div>

</div>

<script>

let datos=JSON.parse(localStorage.getItem("datos"))||[];

function save(){localStorage.setItem("datos",JSON.stringify(datos));}
function hoy(){return new Date().toLocaleDateString();}

/* TABS */
function tab(t){
reg.classList.toggle("hidden",t!="reg");
rep.classList.toggle("hidden",t!="rep");

document.querySelectorAll(".tab")[0].classList.toggle("active",t=="reg");
document.querySelectorAll(".tab")[1].classList.toggle("active",t=="rep");

if(t=="rep") generar();
}

/* AGREGAR */
function add(){
let f=fecha.value?new Date(fecha.value).toLocaleDateString():hoy();
let c=cliente.value;
let t=parseFloat(total.value);
if(!t)return;

datos.push({fecha:f,cliente:c,total:t,tipo:"normal"});
save(); update();

cliente.value=""; total.value="";
}

function addCerrado(){
let f=fecha.value?new Date(fecha.value).toLocaleDateString():hoy();
let m=parseFloat(cerrado.value);
if(!m)return;

datos.push({fecha:f,cliente:"CERRADO",total:m,tipo:"cerrado"});
save(); update();

cerrado.value="";
}

/* LISTA */
function update(){
let html="";
datos.forEach(d=>{
if(d.fecha===hoy()){
if(d.tipo==="normal") html+=`<p>🥤 ${d.cliente} - $${d.total}</p>`;
if(d.tipo==="cerrado") html+=`<p>📦 $${d.total}</p>`;
}
});
lista.innerHTML=html;
}

/* SEMANA */
function inicioSemana(){
let d=new Date();
let day=d.getDay();
let diff=d.getDate()-day+(day===5?0:(day<5?-7:0))+5;
return new Date(d.setDate(diff));
}

/* REPORTE */
function generar(){

let h=0,s=0,m=0;
let hoyStr=hoy();
let sem=inicioSemana();
let mes=new Date(new Date().getFullYear(), new Date().getMonth(),1);

datos.forEach(d=>{
let f=new Date(d.fecha);
if(d.fecha===hoyStr && d.tipo==="normal") h+=d.total;
if(f>=sem && d.tipo==="normal") s+=d.total;
if(f>=mes && d.tipo==="normal") m+=d.total;
});

/* 🔥 SIN LOGO DUPLICADO */
reporte.innerHTML=`
<h3 style="text-align:center;color:gold;">BELLE VITA</h3>

<div class="big">$${h}</div>
<p style="text-align:center;">🥤 ${(h/90).toFixed(2)} consumos</p>

<hr>

<p>🔴 $${(h*0.7).toFixed(2)}</p>
<p>🟢 $${(h*0.3).toFixed(2)}</p>

<hr>

<p>Semana 🔴 $${(s*0.7).toFixed(2)} | 🟢 $${(s*0.3).toFixed(2)}</p>
<p>Mes 🔴 $${(m*0.7).toFixed(2)} | 🟢 $${(m*0.3).toFixed(2)}</p>
`;
}

/* IMAGEN */
function capturar(){
html2canvas(reporte,{useCORS:true}).then(c=>{
let a=document.createElement("a");
a.href=c.toDataURL();
a.download="reporte.png";
a.click();
});
}

/* WHATSAPP */
function whatsapp(){
html2canvas(reporte,{useCORS:true}).then(c=>{
window.open(`https://wa.me/?text=Reporte Belle Vita listo 📊`);
});
}

update();

</script>

</body>
</html>
