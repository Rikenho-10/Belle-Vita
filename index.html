<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belle Vita</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:radial-gradient(circle,#1a1a1a,#000);
color:white;
}

.app{max-width:360px;margin:auto;padding:10px;}

.tabs{display:flex;gap:6px;}
.tab{flex:1;padding:8px;text-align:center;border-radius:10px;background:#111;border:1px solid #333;font-size:13px;}
.tab.active{background:red;}

.logo{
width:110px;height:110px;object-fit:contain;
display:block;margin:12px auto;border-radius:50%;
box-shadow:0 0 15px gold;cursor:pointer;
}

.card{
background:#111;padding:10px;border-radius:10px;
margin-top:8px;border:1px solid gold;
}

input,select{
width:100%;padding:6px;margin-top:5px;
border-radius:6px;border:none;background:#222;color:white;font-size:13px;
}

button{
width:100%;padding:7px;margin-top:6px;
border:none;border-radius:7px;font-weight:bold;font-size:13px;
}

.btn-red{background:#e60000;}
.btn-gold{background:gold;color:black;}
.btn-green{background:#2ecc71;}

.lista p{margin:3px 0;font-size:13px;border-bottom:1px solid #333;padding:3px;}

.hidden{display:none;}

/* 🔥 CONSUMOS RESALTADOS */
.consumos{
font-size:28px;
color:gold;
text-shadow:0 0 10px gold;
margin:10px 0;
}

</style>
</head>

<body>

<div class="app">

<div class="tabs">
<div class="tab active" onclick="tab('reg')">Registro</div>
<div class="tab" onclick="tab('rep')">Reporte</div>
</div>

<img id="logo" class="logo">
<input type="file" id="fileLogo" hidden>

<!-- REGISTRO -->
<div id="reg">

<div class="card">
<input id="fecha" type="date">
<input id="cliente" placeholder="Cliente">
<input id="total" type="number" placeholder="Total $">
<button class="btn-red" onclick="add()">Guardar</button>
</div>

<div class="card">
<input id="cerrado" type="number" placeholder="Producto cerrado">
<button class="btn-red" onclick="addCerrado()">Agregar</button>
</div>

<div class="card">
<h4>Clientes del día</h4>
<div id="lista"></div>
</div>

<div class="card">
<h4>Producto cerrado</h4>
<div id="cerrados"></div>
</div>

</div>

<!-- REPORTE -->
<div id="rep" class="hidden">

<div class="card">
<select id="tipoReporte" onchange="generar()">
<option value="dia">Diario</option>
<option value="semana">Semanal</option>
<option value="mes">Mensual</option>
</select>

<input id="filtro" type="date" onchange="generar()">
</div>

<div id="reporte" class="card"></div>

<button class="btn-gold" onclick="capturar()">📸 Imagen</button>

</div>

</div>

<script>

let datos = JSON.parse(localStorage.getItem("datos")) || [];

/* LOGO */
logo.onclick=()=>fileLogo.click();
fileLogo.onchange=e=>{
let r=new FileReader();
r.onload=()=>{
localStorage.setItem("logo",r.result);
logo.src=r.result;
};
r.readAsDataURL(e.target.files[0]);
};
logo.src=localStorage.getItem("logo")||"logo.png";

/* FECHA */
function hoy(){return new Date().toISOString().split("T")[0];}

/* TABS */
function tab(t){
reg.classList.toggle("hidden",t!="reg");
rep.classList.toggle("hidden",t!="rep");
document.querySelectorAll(".tab")[0].classList.toggle("active",t=="reg");
document.querySelectorAll(".tab")[1].classList.toggle("active",t=="rep");
if(t=="rep") generar();
}

/* AGREGAR */
function add(){
let f=fecha.value||hoy();
let c=cliente.value;
let t=parseFloat(total.value);
if(!t)return;
datos.push({fecha:f,cliente:c,total:t,tipo:"normal"});
save();update();
cliente.value="";total.value="";
}

function addCerrado(){
let f=fecha.value||hoy();
let m=parseFloat(cerrado.value);
if(!m)return;
datos.push({fecha:f,total:m,tipo:"cerrado"});
save();update();
cerrado.value="";
}

function save(){localStorage.setItem("datos",JSON.stringify(datos));}

/* LISTAS */
function update(){
let fSel=fecha.value||hoy();
let html="",html2="";

datos.forEach(d=>{
if(d.fecha===fSel){
if(d.tipo==="normal") html+=`<p>🥤 ${d.cliente} - $${d.total}</p>`;
if(d.tipo==="cerrado") html2+=`<p>📦 $${d.total}</p>`;
}
});

lista.innerHTML=html;
cerrados.innerHTML=html2;
}

/* SEMANA VIERNES A JUEVES */
function inicioSemana(fecha){
let d=new Date(fecha);
let day=d.getDay();
let diff=d.getDate()-day+5;
return new Date(d.setDate(diff));
}

/* REPORTE */
function generar(){
let tipo=tipoReporte.value;
let fSel=new Date(filtro.value||hoy());

let total=0;

datos.forEach(d=>{
let fd=new Date(d.fecha);

if(tipo==="dia" && d.fecha===fSel.toISOString().split("T")[0] && d.tipo==="normal") total+=d.total;

if(tipo==="semana"){
let ini=inicioSemana(fSel);
let fin=new Date(ini); fin.setDate(ini.getDate()+6);
if(fd>=ini && fd<=fin && d.tipo==="normal") total+=d.total;
}

if(tipo==="mes"){
if(fd.getMonth()===fSel.getMonth() && fd.getFullYear()===fSel.getFullYear() && d.tipo==="normal") total+=d.total;
}

});

let consumos=(total/90).toFixed(2);
let rojo=(total*0.7).toFixed(2);
let verde=(total*0.3).toFixed(2);

reporte.innerHTML=`
<h3 style="color:gold;">REPORTE</h3>

<div class="consumos">${consumos} 🥤</div>

<p>Total: $${total}</p>
<p>🔴 $${rojo}</p>
<p>🟢 $${verde}</p>
`;
}

/* IMAGEN */
function capturar(){
html2canvas(reporte).then(c=>{
let link=document.createElement("a");
link.download="reporte.png";
link.href=c.toDataURL();
link.click();
});
}

/* INIT */
fecha.value=hoy();
filtro.value=hoy();
update();

</script>

</body>
</html>
