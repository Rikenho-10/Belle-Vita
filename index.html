<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belle Vita - Ricardo Luxury Master</title>
    <!-- Librería para la captura de imagen -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        :root {
            --emerald: #0b1f15;
            --gold: #c5a059;
            --gold-light: #e4c68d;
            --paper: #fdfaf5;
            --rojo: #b03a2e;
            --verde: #1e8449;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--emerald); color: white; display: flex; justify-content: center; min-height: 100vh; }
        .app-shell { width: 100%; max-width: 480px; background: var(--emerald); display: flex; flex-direction: column; }

        /* HEADER */
        .header { padding: 30px 15px; text-align: center; }
        .logo-box { 
            width: 80px; height: 80px; background: white; margin: 0 auto 10px; 
            border-radius: 50%; border: 3px solid var(--gold); 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            box-shadow: 0 0 20px var(--gold); cursor: pointer;
            animation: pulse-gold 2s infinite;
        }
        @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 10px var(--gold); } 50% { box-shadow: 0 0 30px var(--gold-light); } }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .logo-box b { font-size: 30px; color: var(--emerald); }
        .header h1 { font-family: 'Playfair Display', serif; color: var(--gold); margin: 0; font-size: 24px; letter-spacing: 3px; text-transform: uppercase; }

        /* NAVEGACION */
        .tabs { display: flex; padding: 0 20px; gap: 10px; margin-top: -15px; z-index: 100; }
        .tab-btn { 
            flex: 1; padding: 16px; border-radius: 12px; border: 1px solid var(--gold); 
            font-weight: 900; font-size: 10px; cursor: pointer; text-align: center;
            background: rgba(0,0,0,0.6); color: var(--gold); transition: 0.3s;
        }
        .tab-btn.active { background: var(--gold); color: var(--emerald); }

        /* VIEWS */
        .view { padding: 25px 20px; flex: 1; }
        .lux-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-bottom: 25px; border: 1px solid rgba(197, 160, 89, 0.2); }
        .lux-lbl { font-size: 10px; font-weight: 900; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 2px; }
        
        input, select { 
            width: 100%; padding: 14px; border: none; border-radius: 10px; 
            background: rgba(0,0,0,0.3); color: white; margin-bottom: 15px;
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.5); font-family: inherit; font-weight: 600;
        }

        .btn-lux { 
            width: 100%; padding: 18px; border-radius: 15px; border: none; 
            font-weight: 900; text-transform: uppercase; cursor: pointer; 
            transition: 0.2s; letter-spacing: 1px;
        }
        .btn-gold { background: linear-gradient(135deg, var(--gold-light), var(--gold)); color: var(--emerald); }
        .btn-dark { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .btn-green { background: var(--verde); color: white; margin-top: 20px; font-size: 16px; }
        .btn-lux:active { transform: scale(0.97); opacity: 0.8; }

        .log-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 8px; border-left: 4px solid var(--gold); }
        .btn-del { background: rgba(176, 58, 46, 0.3); color: #ff6b6b; border: none; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 900; cursor: pointer; }

        /* =========================================
           DISEÑO DEL REPORTE (Apegado a 416418.jpg)
           ========================================= */
        #reporte-export {
            width: 800px; /* Ancho fijo */
            min-height: 1100px; /* Altura mínima, crecerá con el contenido */
            background: var(--emerald);
            padding: 50px 40px; 
            position: relative; color: white; 
            display: flex; flex-direction: column;
            border: 3px solid var(--gold);
        }
        
        .c-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        .c-logo-group { display: flex; align-items: center; gap: 20px; }
        .c-logo-circle { width: 140px; height: 140px; border: 4px solid var(--gold); border-radius: 50%; background: white; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(197, 160, 89, 0.5); }
        .c-logo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .c-club-text h2 { font-family: 'Playfair Display', serif; font-size: 50px; margin: 0; letter-spacing: 3px; }
        .c-club-text p { color: var(--gold); font-size: 13px; text-transform: uppercase; margin: 0; letter-spacing: 5px; font-weight: 300; }

        .c-date-box { border: 2.5px solid var(--gold); padding: 15px 30px; text-align: center; border-radius: 15px; background: rgba(0,0,0,0.3); }
        .c-date-n { font-size: 55px; font-weight: 900; line-height: 1; }
        .c-date-t { font-size: 14px; color: var(--gold); text-transform: uppercase; font-weight: 800; margin-top: 5px; }

        .c-main { display: flex; gap: 30px; flex: 1; }
        .c-left-col { flex: 1.25; }
        .c-right-col { flex: 0.75; display: flex; flex-direction: column; gap: 20px; }

        /* Tabla Estilo Luxury */
        .table-luxe { width: 100%; border-collapse: separate; border-spacing: 0 3px; background: var(--paper); border-radius: 12px; border: 3px solid var(--gold); overflow: hidden; }
        .table-luxe thead { background: var(--emerald); color: var(--gold); font-size: 16px; }
        .table-luxe th { padding: 15px; text-transform: uppercase; font-family: 'Playfair Display', serif; }
        .table-luxe td { padding: 12px 15px; color: var(--emerald); font-weight: 800; font-size: 18px; border-bottom: 1px solid rgba(0,0,0,0.05); }

        .c-exec-box { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(255,255,255,0.03); border: 2.5px solid var(--gold); border-radius: 40px; text-align: center; padding: 40px; }
        .c-exec-lbl { font-size: 22px; color: var(--gold); text-transform: uppercase; letter-spacing: 5px; margin-bottom: 10px; }
        .c-exec-val { font-size: 110px; font-weight: 900; color: white; text-shadow: 0 0 30px var(--gold); }

        /* Badges */
        .c-badge-pill { background: rgba(0,0,0,0.5); border: 2px solid var(--gold); border-radius: 60px; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .c-badge-lbl { font-size: 16px; color: var(--gold); text-transform: uppercase; font-weight: 800; font-family: 'Playfair Display'; }
        .c-badge-num { background: var(--verde); color: white; min-width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 26px; font-weight: 900; }

        .c-stat-card { background: var(--paper); color: var(--emerald); border-radius: 15px; padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; border-left: 10px solid var(--gold); }
        .c-stat-card.rojo { border-left-color: var(--rojo); color: var(--rojo); }
        .c-stat-card.verde { border-left-color: var(--verde); color: var(--verde); }
        .c-stat-lbl { font-size: 13px; font-weight: 900; text-transform: uppercase; color: #777; }
        .c-stat-val { font-size: 30px; font-weight: 900; }

        .c-footer { margin-top: 50px; text-align: center; border-top: 2px solid rgba(197,160,89,0.3); padding-top: 30px; font-family: 'Playfair Display', serif; font-style: italic; font-size: 26px; }

        .hidden { display: none !important; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--gold); color: var(--emerald); padding: 15px 30px; border-radius: 50px; font-weight: 900; opacity: 0; transition: 0.5s; z-index: 9999; }
    </style>
</head>
<body>

<div class="app-shell">
    <!-- UI HEADER -->
    <div class="header">
        <input type="file" id="logo-input" class="hidden" accept="image/*">
        <div class="logo-box" id="logo-trigger">
            <img id="ui-logo-img" class="hidden">
            <b id="ui-logo-def">BV</b>
        </div>
        <h1>Belle Vita</h1>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn active" id="tab-o" onclick="window.navegar('oper')">OPERACIÓN</button>
        <button class="tab-btn" id="tab-r" onclick="window.navegar('repo')">REPORTES</button>
    </div>

    <!-- VISTA REGISTRO -->
    <div id="view-oper" class="view">
        <div class="lux-card">
            <span class="lux-lbl">📅 Fecha de Operación</span>
            <input type="date" id="fecha-actual">
        </div>
        <div class="lux-card">
            <span class="lux-lbl">🥤 Consumo Barra (Socio)</span>
            <input type="text" id="nombre-socio" placeholder="Nombre">
            <input type="number" id="monto-socio" placeholder="Monto $">
            <button class="btn-lux btn-gold" onclick="window.guardarRegistro('normal')">Añadir Consumo</button>
        </div>
        <div class="lux-card">
            <span class="lux-lbl">📦 Venta Cerrada (Producto)</span>
            <input type="text" id="nombre-prod" placeholder="Producto">
            <input type="number" id="monto-prod" placeholder="Monto $">
            <button class="btn-lux btn-dark" onclick="window.guardarRegistro('cerrado')">Registrar Venta</button>
        </div>
        <span class="lux-lbl">Actividad Registrada</span>
        <div id="bitacora-lista"></div>
    </div>

    <!-- VISTA REPORTES -->
    <div id="view-repo" class="view hidden">
        <div class="lux-card">
            <span class="lux-lbl">Configurar Reporte</span>
            <select id="filtro-modo" onchange="window.recalcular()">
                <option value="dia">Reporte Diario (Lista Completa)</option>
                <option value="semana">Resumen Semanal (Vie-Jue)</option>
                <option value="mes">Resumen Mensual</option>
                <option value="rango">Rango Personalizado</option>
            </select>
            <div id="div-f-simple">
                <input type="date" id="fecha-ref" onchange="window.recalcular()">
            </div>
            <div id="div-f-rango" class="hidden">
                <input type="date" id="rango-de" onchange="window.recalcular()">
                <input type="date" id="rango-a" onchange="window.recalcular()">
            </div>
        </div>

        <!-- AREA DE CAPTURA (Oculta para el usuario) -->
        <div style="position: absolute; top: -20000px; left: -20000px; width: 800px;">
            <div id="reporte-export">
                <div class="c-header">
                    <div class="c-logo-group">
                        <div class="c-logo-circle">
                            <img id="can-logo-img" class="hidden">
                            <b id="can-logo-def" style="font-size: 55px; color: #c5a059;">BV</b>
                        </div>
                        <div class="c-club-text">
                            <h2>BELLE VITA</h2>
                            <p>Luxury Nutrition Experience</p>
                        </div>
                    </div>
                    <div class="c-date-box">
                        <div class="c-date-n" id="c-num">21</div>
                        <div class="c-date-t" id="c-txt">Abril, 2026</div>
                    </div>
                </div>
                <div class="c-main">
                    <div class="c-left-col" id="c-dinamico"></div>
                    <div class="c-right-col">
                        <div class="c-badge-pill">
                            <span class="c-badge-lbl" id="c-lbl-c">Consumos</span>
                            <span class="c-badge-num" id="c-val-consumos">0</span>
                        </div>
                        <div class="c-stat-card"><div class="stat-inner"><span class="c-stat-lbl">P. Cerrado</span><div class="c-stat-val" id="c-val-cerrado">$0</div></div></div>
                        <div class="c-stat-card"><div class="stat-inner"><span class="c-stat-lbl">Vta Total</span><div class="c-stat-val" id="c-val-total">$0</div></div></div>
                        <div class="c-stat-card rojo"><div class="stat-inner"><span class="c-stat-lbl" style="color:inherit">Rojo</span><div class="c-stat-val" id="c-val-rojo">$0</div></div></div>
                        <div class="c-stat-card verde"><div class="stat-inner"><span class="c-stat-lbl" style="color:inherit">Verde</span><div class="c-stat-val" id="c-val-verde">$0</div></div></div>
                    </div>
                </div>
                <div class="c-footer">Belle Vita, belleza que nace de ti.</div>
            </div>
        </div>
        <button class="btn-lux btn-green" onclick="window.generarFlyer()">📸 GENERAR FLYER PARA WHATSAPP</button>
    </div>
</div>

<div id="toast"></div>

<script>
    // --- MOTOR MASTER V51 ---
    (function() {
        var db = JSON.parse(localStorage.getItem('bv_luxury_v51')) || [];
        var logo = localStorage.getItem('bv_logo_v51') || null;

        window.onload = function() {
            var hoy = new Date().toISOString().split('T')[0];
            document.getElementById('fecha-actual').value = hoy;
            document.getElementById('fecha-ref').value = hoy;
            document.getElementById('rango-de').value = hoy;
            document.getElementById('rango-a').value = hoy;
            
            if(logo) applyLogo(logo);
            window.renderLista();
            
            document.getElementById('logo-trigger').onclick = function() { 
                document.getElementById('logo-input').click(); 
            };
        };

        // MANEJO DE LOGO
        document.getElementById('logo-input').onchange = function(e) {
            var file = e.target.files[0];
            if(file) {
                var reader = new FileReader();
                reader.onload = function(ev) {
                    logo = ev.target.result;
                    localStorage.setItem('bv_logo_v51', logo);
                    applyLogo(logo);
                };
                reader.readAsDataURL(file);
            }
        };

        function applyLogo(url) {
            document.getElementById('ui-logo-img').src = url; document.getElementById('ui-logo-img').classList.remove('hidden');
            document.getElementById('ui-logo-def').classList.add('hidden');
            document.getElementById('can-logo-img').src = url; document.getElementById('can-logo-img').classList.remove('hidden');
            document.getElementById('can-logo-def').classList.add('hidden');
        }

        // NAVEGACION
        window.navegar = function(v) {
            document.getElementById('view-oper').classList.toggle('hidden', v !== 'oper');
            document.getElementById('view-repo').classList.toggle('hidden', v !== 'repo');
            document.getElementById('tab-o').classList.toggle('active', v === 'oper');
            document.getElementById('tab-r').classList.toggle('active', v === 'repo');
            if(v === 'repo') window.recalcular();
        };

        // GUARDADO
        window.guardarRegistro = function(tipo) {
            var n, m, f = document.getElementById('fecha-actual').value;
            if(tipo === 'normal') {
                n = document.getElementById('nombre-socio').value || "Socio";
                m = parseFloat(document.getElementById('monto-socio').value);
                document.getElementById('nombre-socio').value = ''; document.getElementById('monto-socio').value = '';
            } else {
                n = document.getElementById('nombre-prod').value || "Venta";
                m = parseFloat(document.getElementById('monto-prod').value);
                document.getElementById('nombre-prod').value = ''; document.getElementById('monto-prod').value = '';
            }
            if(isNaN(m)) return;
            db.push({ id: Date.now(), fecha: f, nombre: n, monto: m, tipo: tipo });
            localStorage.setItem('bv_luxury_v51', JSON.stringify(db));
            window.renderLista();
            pop("✅ Registrado");
        };

        window.quitar = function(id) {
            db = db.filter(function(i) { return i.id !== id; });
            localStorage.setItem('bv_luxury_v51', JSON.stringify(db));
            window.renderLista();
        };

        window.renderLista = function() {
            var box = document.getElementById('bitacora-lista');
            var hoy = document.getElementById('fecha-actual').value;
            var fil = db.filter(function(d) { return d.fecha === hoy; });
            if(fil.length === 0) { box.innerHTML = '<p style="text-align:center; color:#555; font-size:12px;">Sin registros</p>'; return; }
            box.innerHTML = fil.map(function(i) {
                return '<div class="log-item"><div><b>' + (i.tipo === 'cerrado' ? '📦' : '🥤') + ' ' + i.nombre + '</b><br><small>$' + i.monto.toFixed(2) + '</small></div><button class="btn-del" onclick="window.quitar(' + i.id + ')">QUITAR</button></div>';
            }).join('');
        };

        // CALCULO DE REPORTES
        window.recalcular = function() {
            var m = document.getElementById('filtro-modo').value;
            document.getElementById('div-f-simple').classList.toggle('hidden', m === 'rango');
            document.getElementById('div-f-rango').classList.toggle('hidden', m !== 'rango');

            var res = [], dI, dF, setD = new Set();

            if(m === 'rango') {
                dI = new Date(document.getElementById('rango-de').value + 'T12:00:00');
                dF = new Date(document.getElementById('rango-a').value + 'T12:00:00');
                res = db.filter(function(d) {
                    var f = new Date(d.fecha + 'T12:00:00');
                    if(f >= dI && f <= dF) { if(d.tipo === 'normal') setD.add(d.fecha); return true; }
                    return false;
                });
            } else {
                var r = document.getElementById('fecha-ref').value;
                var dR = new Date(r + 'T12:00:00');
                if(m === 'dia') { res = db.filter(function(d) { return d.fecha === r; }); dI = dR; dF = dR; }
                else if(m === 'semana') {
                    var dia = dR.getDay();
                    var diff = (dia >= 5) ? (dia - 5) : (dia + 2);
                    dI = new Date(dR); dI.setDate(dR.getDate() - diff);
                    dF = new Date(dI); dF.setDate(dI.getDate() + 6);
                    res = db.filter(function(d) {
                        var f = new Date(d.fecha + 'T12:00:00');
                        if(f >= dI && f <= dF) { if(d.tipo === 'normal') setD.add(d.fecha); return true; }
                        return false;
                    });
                } else {
                    res = db.filter(function(d) {
                        var f = new Date(d.fecha + 'T12:00:00');
                        if(f.getMonth() === dR.getMonth() && f.getFullYear() === dR.getFullYear()) { if(d.tipo === 'normal') setD.add(d.fecha); return true; }
                        return false;
