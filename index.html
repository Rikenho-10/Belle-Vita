<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belle Vita Premium - Ricardo Master</title>
    <!-- Librería para el reporte de WhatsApp -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        :root {
            --emerald: #0b1f15;
            --gold: #c5a059;
            --gold-light: #e4c68d;
            --paper: #fdfaf5;
            --rojo: #b03a2e;
            --verde: #1e8449;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--emerald); color: white; display: flex; justify-content: center; min-height: 100vh; }
        .app-shell { width: 100%; max-width: 480px; background: var(--emerald); display: flex; flex-direction: column; position: relative; }

        /* HEADER */
        .header { padding: 30px 15px; text-align: center; }
        .logo-box { 
            width: 80px; height: 80px; background: white; margin: 0 auto 10px; 
            border-radius: 50%; border: 3px solid var(--gold); 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            box-shadow: 0 0 20px var(--gold); cursor: pointer;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .logo-box b { font-size: 30px; color: var(--emerald); }
        .header h1 { font-family: 'Playfair Display', serif; color: var(--gold); margin: 0; font-size: 24px; letter-spacing: 3px; text-transform: uppercase; }

        /* NAVEGACION */
        .tabs { display: flex; padding: 0 20px; gap: 10px; margin-top: -15px; z-index: 100; }
        .tab-btn { 
            flex: 1; padding: 16px; border-radius: 12px; border: 1px solid var(--gold); 
            font-weight: 900; font-size: 10px; cursor: pointer; text-align: center;
            background: rgba(0,0,0,0.6); color: var(--gold); transition: 0.3s;
        }
        .tab-btn.active { background: var(--gold); color: var(--emerald); }

        /* VISTAS */
        .view { padding: 25px 20px; flex: 1; }
        .view.hidden { display: none; }
        .lux-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-bottom: 25px; border: 1px solid rgba(197, 160, 89, 0.2); }
        .lux-lbl { font-size: 10px; font-weight: 900; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 2px; }
        
        input, select { 
            width: 100%; padding: 14px; border: none; border-radius: 10px; 
            background: rgba(0,0,0,0.3); color: white; margin-bottom: 15px;
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.5); font-family: inherit; font-weight: 600;
        }

        .btn-lux { 
            width: 100%; padding: 18px; border-radius: 15px; border: none; 
            font-weight: 900; text-transform: uppercase; cursor: pointer; 
            transition: 0.2s; letter-spacing: 1px;
        }
        .btn-gold { background: linear-gradient(135deg, var(--gold-light), var(--gold)); color: var(--emerald); }
        .btn-dark { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .btn-green { background: var(--verde); color: white; margin-top: 20px; font-size: 16px; }
        .btn-lux:active { transform: scale(0.97); opacity: 0.8; }

        .log-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 8px; border-left: 4px solid var(--gold); }
        .btn-del { background: rgba(176, 58, 46, 0.3); color: #ff6b6b; border: none; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 900; cursor: pointer; }

        /* REPORTE PARA WHATSAPP - DISEÑO 416418 */
        #reporte-export {
            width: 800px; 
            min-height: 1100px; 
            background: var(--emerald);
            padding: 50px 40px; 
            position: relative; color: white; 
            display: flex; flex-direction: column;
            border: 3px solid var(--gold);
        }
        .c-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .c-logo-group { display: flex; align-items: center; gap: 20px; }
        .c-logo-circle { width: 130px; height: 130px; border: 4px solid var(--gold); border-radius: 50%; background: white; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(197, 160, 89, 0.5); }
        .c-logo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .c-club-text h2 { font-family: 'Playfair Display', serif; font-size: 48px; margin: 0; letter-spacing: 3px; }
        .c-club-text p { color: var(--gold); font-size: 12px; text-transform: uppercase; margin: 0; letter-spacing: 4px; }

        .c-date-box { border: 2.5px solid var(--gold); padding: 12px 25px; text-align: center; border-radius: 15px; background: rgba(0,0,0,0.3); }
        .c-date-n { font-size: 55px; font-weight: 900; line-height: 1; }
        .c-date-t { font-size: 14px; color: var(--gold); text-transform: uppercase; font-weight: 800; margin-top: 5px; }

        .c-main { display: flex; gap: 30px; flex: 1; }
        .c-left-col { flex: 1.25; }
        .c-right-col { flex: 0.75; display: flex; flex-direction: column; gap: 20px; }

        .c-table { width: 100%; border-collapse: separate; border-spacing: 0 3px; background: var(--paper); border-radius: 12px; border: 3px solid var(--gold); overflow: hidden; }
        .c-table th { background: var(--emerald); color: var(--gold); padding: 15px; font-size: 16px; text-transform: uppercase; }
        .c-table td { padding: 12px 15px; color: var(--emerald); font-weight: 800; font-size: 18px; border-bottom: 1px solid rgba(0,0,0,0.05); }

        .c-exec-box { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(255,255,255,0.03); border: 2px solid var(--gold); border-radius: 40px; text-align: center; padding: 20px; }
        .c-exec-lbl { font-size: 20px; color: var(--gold); text-transform: uppercase; letter-spacing: 5px; margin-bottom: 15px; }
        .c-exec-val { font-size: 110px; font-weight: 900; color: white; text-shadow: 0 0 30px var(--gold); }

        .c-badge-pill { background: rgba(0,0,0,0.5); border: 2px solid var(--gold); border-radius: 60px; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .c-badge-lbl { font-size: 14px; color: var(--gold); text-transform: uppercase; font-weight: 800; font-family: 'Playfair Display'; }
        .c-badge-num { background: var(--verde); color: white; min-width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; border-radius: 35px; font-size: 26px; font-weight: 900; }

        .c-stat-card { background: var(--paper); color: var(--emerald); border-radius: 15px; padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; border-left: 10px solid var(--gold); }
        .c-stat-card.rojo { border-left-color: var(--rojo); color: var(--rojo); }
        .c-stat-card.verde { border-left-color: var(--verde); color: var(--verde); }
        .c-stat-val { font-size: 30px; font-weight: 900; }

        .c-footer { margin-top: 40px; text-align: center; border-top: 2px solid rgba(197, 160, 89, 0.3); padding-top: 30px; font-family: 'Playfair Display', serif; font-style: italic; font-size: 24px; }

        /* UTILS */
        .msg-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--gold); color: var(--emerald); padding: 12px 25px; border-radius: 50px; font-weight: 900; font-size: 13px; opacity: 0; transition: 0.5s; z-index: 1000; pointer-events: none; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="header">
        <input type="file" id="upLogo" style="display:none" accept="image/*">
        <div class="logo-box" id="btnLogo">
            <img id="logoUi" class="hidden">
            <b id="logoDef">BV</b>
        </div>
        <h1>Belle Vita</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-o" onclick="navegar('oper')">REGISTRO</button>
        <button class="tab-btn" id="tab-r" onclick="navegar('repo')">REPORTES</button>
    </div>

    <!-- OPERACION -->
    <div id="view-oper" class="view">
        <div class="lux-card">
            <span class="lux-lbl">📅 Fecha Actual</span>
            <input type="date" id="iFecha">
        </div>
        <div class="lux-card">
            <span class="lux-lbl">🥤 Barra (Socio)</span>
            <input type="text" id="iNom" placeholder="Nombre Socio">
            <input type="number" id="iMon" placeholder="Monto $">
            <button class="btn-lux btn-gold" onclick="guardar('normal')">Añadir Consumo</button>
        </div>
        <div class="lux-card">
            <span class="lux-lbl">📦 Producto</span>
            <input type="text" id="iProd" placeholder="Venta Cerrada">
            <input type="number" id="iProdMon" placeholder="Monto $">
            <button class="btn-lux btn-dark" onclick="guardar('cerrado')">Registrar Venta</button>
        </div>
        <span class="lux-lbl">Actividad</span>
        <div id="bitacora"></div>
    </div>

    <!-- REPORTE -->
    <div id="view-repo" class="view hidden">
        <div class="lux-card">
            <span class="lux-lbl">Filtro de Reporte</span>
            <select id="sPeriodo" onchange="calcular()">
                <option value="dia">Reporte Diario (Lista)</option>
                <option value="semana">Semanal (Vie-Jue)</option>
                <option value="mes">Mensual</option>
                <option value="rango">Personalizado</option>
            </select>
            <div id="fSimple">
                <input type="date" id="fRef" onchange="calcular()">
            </div>
            <div id="fRango" class="hidden">
                <input type="date" id="fDe" onchange="calcular()">
                <input type="date" id="fA" onchange="calcular()">
            </div>
        </div>

        <div style="position: absolute; top: -10000px; left: -10000px; width: 800px;">
            <div id="reporte-export">
                <div class="c-header">
                    <div class="c-logo-group">
                        <div class="c-logo-circle">
                            <img id="canImg" class="hidden">
                            <b id="canDef" style="font-size: 55px; color: #c5a059;">BV</b>
                        </div>
                        <div class="c-club-text">
                            <h2>BELLE VITA</h2>
                            <p>Luxury Nutrition Experience</p>
                        </div>
                    </div>
                    <div class="c-date-box">
                        <div class="c-date-n" id="c-num">21</div>
                        <div class="c-date-t" id="c-txt">Abril, 2026</div>
                    </div>
                </div>
                <div class="c-main">
                    <div class="c-left-col" id="c-dinamico"></div>
                    <div class="c-right-col">
                        <div class="c-badge-pill">
                            <span class="c-badge-lbl" id="c-lbl">Consumos</span>
                            <span class="c-badge-num" id="c-cons">0</span>
                        </div>
                        <div class="c-stat-card"><span>P. Cerrado</span><div class="c-stat-val" id="c-v-c">$0</div></div>
                        <div class="c-stat-card"><span>Vta Total</span><div class="c-stat-val" id="c-v-t">$0</div></div>
                        <div class="c-stat-card rojo"><span>Rojo</span><div class="c-stat-val" id="c-v-r">$0</div></div>
                        <div class="c-stat-card verde"><span>Verde</span><div class="c-stat-val" id="c-v-v">$0</div></div>
                    </div>
                </div>
                <div class="c-footer">Belle Vita, belleza que nace de ti.</div>
            </div>
        </div>
        <button class="btn-lux btn-green" onclick="capturar()">📸 GENERAR FLYER WHATSAPP</button>
    </div>
</div>

<div id="toast" class="msg-toast"></div>

<script>
    // --- MOTOR BLINDADO ---
    var database = JSON.parse(localStorage.getItem('bv_luxury_v100')) || [];
    var logo_url = localStorage.getItem('bv_logo_v100') || null;

    window.onload = function() {
        var h = new Date().toISOString().split('T')[0];
        document.getElementById('iFecha').value = h;
        document.getElementById('fRef').value = h;
        document.getElementById('fDe').value = h;
        document.getElementById('fA').value = h;
        if(logo_url) applyLogo(logo_url);
        renderLog();
        document.getElementById('btnLogo').onclick = function() { document.getElementById('upLogo').click(); };
    };

    document.getElementById('upLogo').onchange = function(e) {
        var f = e.target.files[0];
        if(f) {
            var r = new FileReader();
            r.onload = function(ev) {
                logo_url = ev.target.result;
                localStorage.setItem('bv_logo_v100', logo_url);
                applyLogo(logo_url);
            };
            r.readAsDataURL(f);
        }
    };

    function applyLogo(u) {
        document.getElementById('logoUi').src = u; document.getElementById('logoUi').classList.remove('hidden');
        document.getElementById('logoDef').classList.add('hidden');
        document.getElementById('canImg').src = u; document.getElementById('canImg').classList.remove('hidden');
        document.getElementById('canDef').classList.add('hidden');
    }

    function navegar(s) {
        document.getElementById('view-oper').classList.toggle('hidden', s !== 'oper');
        document.getElementById('view-repo').classList.toggle('hidden', s !== 'repo');
        document.getElementById('tab-o').classList.toggle('active', s === 'oper');
        document.getElementById('tab-r').classList.toggle('active', s === 'repo');
        if(s === 'repo') calcular();
    }

    function guardar(tipo) {
        var n, m, f = document.getElementById('iFecha').value;
        if(tipo === 'normal') {
            n = document.getElementById('iNom').value || "Socio";
            m = parseFloat(document.getElementById('iMon').value);
            document.getElementById('iNom').value = ''; document.getElementById('iMon').value = '';
        } else {
            n = document.getElementById('iProd').value || "Venta";
            m = parseFloat(document.getElementById('iProdMon').value);
            document.getElementById('iProd').value = ''; document.getElementById('iProdMon').value = '';
        }
        if(isNaN(m)) return;
        database.push({ id: Date.now(), fecha: f, nombre: n, monto: m, tipo: tipo });
        localStorage.setItem('bv_luxury_v100', JSON.stringify(database));
        renderLog();
        popToast("✅ Guardado");
    }

    function borrar(id) {
        database = database.filter(function(i) { return i.id !== id; });
        localStorage.setItem('bv_luxury_v100', JSON.stringify(database));
        renderLog();
    }

    function renderLog() {
        var b = document.getElementById('bitacora');
        var hoy = document.getElementById('iFecha').value;
        var f = database.filter(function(d) { return d.fecha === hoy; });
        if(f.length === 0) { b.innerHTML = '<p style="text-align:center;color:#555;font-size:12px;">Sin ventas</p>'; return; }
        b.innerHTML = f.map(function(i) {
            return '<div class="log-item"><div><b>' + (i.tipo === 'cerrado' ? '📦' : '🥤') + ' ' + i.nombre + '</b><br><small>$' + i.monto.toFixed(2) + '</small></div><button class="btn-del" onclick="borrar(' + i.id + ')">X</button></div>';
        }).join('');
    }

    function calcular() {
        var m = document.getElementById('sPeriodo').value;
        document.getElementById('fSimple').classList.toggle('hidden', m === 'rango');
        document.getElementById('fRango').classList.toggle('hidden', m !== 'rango');

        var res = [], dI, dF, setD = new Set();
        if(m === 'rango') {
            dI = new Date(document.getElementById('fDe').value + 'T12:00:00');
            dF = new Date(document.getElementById('fA').value + 'T12:00:00');
            res = database.filter(function(d) {
                var f = new Date(d.fecha + 'T12:00:00');
                if(f >= dI && f <= dF) { if(d.tipo === 'normal') setD.add(d.fecha); return true; }
                return false;
            });
        } else {
            var r = document.getElementById('fRef').value;
            var dR = new Date(r + 'T12:00:00');
            if(m === 'dia') { res = database.filter(function(d) { return d.fecha === r; }); dI = dR; dF = dR; }
            else if(m === 'semana') {
                var dia = dR.getDay();
                var diff = (dia >= 5) ? (dia - 5) : (dia + 2);
                dI = new Date(dR); dI.setDate(dR.getDate() - diff);
                dF = new Date(dI); dF.setDate(dI.getDate() + 6);
                res = database.filter(function(d) {
                    var f = new Date(d.fecha + 'T12:00:00');
                    if(f >= dI && f <= dF) { if(d.tipo === 'normal') setD.add(d.fecha); return true; }
                    return false;
                });
            } else {
                res = database.filter(function(d) {
                    var f = new Date(d.fecha + 'T12:00:00');
                    if(f.getMonth() === dR.getMonth() && f.getFullYear() === dR.getFullYear()) { if(d.tipo === 'normal') setD.add(d.fecha); return true; }
                    return false;
                });
                dI = new Date(dR.getFullYear(), dR.getMonth(), 1);
                dF = new Date(dR.getFullYear(), dR.getMonth() + 1, 0);
            }
        }

        var b = res.filter(function(f) { return f.tipo === 'normal'; });
        var sB = b.reduce(function(a, x) { return a + x.monto; }, 0);
        var sC = res.filter(function(f) { return f.tipo === 'cerrado'; }).reduce(function(a, x) { return a + x.monto; }, 0);
        var total = sB + sC;
        var cons = sB / 90;
        var avg = (cons / (setD.size || 1)).toFixed(2);

        document.getElementById('c-num').innerText = dI.getDate();
        document.getElementById('c-txt').innerText = dI.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
        document.getElementById('c-cons').innerText = m === 'dia' ? cons.toFixed(2) : avg;
        document.getElementById('c-v-c').innerText = '$' + sC.toLocaleString();
        document.getElementById('c-v-t').innerText = '$' + total.toLocaleString();
        document.getElementById('c-v-r').innerText = '$' + (total * 0.7).toLocaleString();
        document.getElementById('c-v-v').innerText = '$' + (total * 0.3).toLocaleString();

        var boxIz = document.getElementById('c-dinamico');
        if(m === 'dia') {
            var html = '<table class="c-table"><thead><tr><th>#</th><th style="text-align:left">Socio</th><th style="text-align:right">$</th></tr></thead><tbody>';
            b.forEach(function(i, idx) { html += '<tr><td style="text-align:center;color:#888;">' + (idx+1) + '</td><td>' + i.nombre + '</td><td style="text-align:right">' + i.monto + '</td></tr>'; });
            boxIz.innerHTML = html + '</tbody></table>';
        } else {
            boxIz.innerHTML = '<div class="c-exec-box"><span class="c-exec-lbl">Consumos Totales</span><div class="c-exec-val">' + cons.toFixed(2) + '</div><span class="c-exec-lbl">Acumulado</span></div>';
        }
    }

    funct
