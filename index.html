<body>

<div class="app">
    <div class="header">
        <input type="file" id="upFile" class="hidden" accept="image/*">
        <div class="logo-ring" onclick="document.getElementById('upFile').click()">
            <img id="logoDisp" class="hidden">
            <b id="logoTxt">BV</b>
        </div>
        <h1>Belle Vita Club</h1>
    </div>

    <div class="tabs">
        <button class="tab active" id="tab-reg-btn" onclick="goTo('reg')">OPERACIÓN</button>
        <button class="tab" id="tab-rep-btn" onclick="goTo('rep')">REPORTES</button>
    </div>

    <!-- VISTA REGISTRO -->
    <div id="view-reg" class="container">
        <div class="card">
            <span class="card-label">📅 Fecha del día</span>
            <input type="date" id="inputFecha">
        </div>
        <div class="card">
            <span class="card-label">🥤 Barra</span>
            <input id="inNombre" placeholder="Nombre Socio">
            <input type="number" id="inMonto" placeholder="Total $">
            <button class="btn btn-oro" onclick="doSave('normal')">Guardar en Barra</button>
        </div>
        <div class="card">
            <span class="card-label">📦 Cerrado</span>
            <input id="inProd" placeholder="Venta Cerrada">
            <input type="number" id="inMontoP" placeholder="Total $">
            <button class="btn btn-dark" onclick="doSave('cerrado')">Registrar Producto</button>
        </div>
        <span class="card-label">Actividad</span>
        <div id="listaMovs"></div>
    </div>

    <!-- VISTA REPORTES -->
    <div id="view-rep" class="container hidden">
        <div class="card">
            <span class="card-label">Tipo de Reporte</span>
            <select id="selModo" onchange="toggleFilters()">
                <option value="dia">Reporte Diario</option>
                <option value="semana">Semana (Vie-Jue)</option>
                <option value="mes">Reporte Mensual</option>

            </select>
            
            <div id="f-simple">
                <span class="card-label">Día de Referencia</span>
                <input type="date" id="dateRef" onchange="doCalc()">
            </div>
            
            <div id="f-rango" class="hidden">

                <input type="date" id="dateFrom" onchange="doCalc()">

                    <div class="rep-badge-consumos">
                        <span class="rep-badge-lbl">Consumos</span>

<div id="toast"></div>

<script>
    // Memoria
    let rawData = JSON.parse(localStorage.getItem('bv_pro_v10')) || [];
    let rawLogo = localStorage.getItem('bv_logo_v10') || null;

    // Elementos
    const inFecha = document.getElementById('inputFecha');
    const dateRef = document.getElementById('dateRef');
    const selModo = document.getElementById('selModo');

    window.onload = () => {
        const hoy = new Date().toISOString().split('T')[0];
        inFecha.value = hoy;
        dateRef.value = hoy;
        document.getElementById('dateFrom').value = hoy;
        document.getElementById('dateTo').value = hoy;
        if(rawLogo) putLogo(rawLogo);
        drawLog();
    };

    // LOGO
    document.getElementById('upFile').onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                rawLogo = ev.target.result;
                localStorage.setItem('bv_logo_v10', rawLogo);
                putLogo(rawLogo);
            };
            reader.readAsDataURL(file);
        }
    };

    function putLogo(url) {
        document.getElementById('logoDisp').src = url; document.getElementById('logoDisp').classList.remove('hidden');
        document.getElementById('logoTxt').classList.add('hidden');
        document.querySelectorAll('.limg').forEach(i => { i.src = url; i.classList.remove('hidden'); });
        document.querySelectorAll('.ltxt').forEach(t => t.classList.add('hidden'));
    }

    // NAVEGACION
    function goTo(v) {
        document.getElementById('view-reg').classList.toggle('hidden', v !== 'reg');
        document.getElementById('view-rep').classList.toggle('hidden', v !== 'rep');
        document.getElementById('tab-reg-btn').classList.toggle('active', v === 'reg');
        document.getElementById('tab-rep-btn').classList.toggle('active', v === 'rep');
        if(v === 'rep') doCalc();
    }

    // OPERACION
    function doSave(tipo) {
        let n, m;
        if(tipo === 'normal') {
            n = document.getElementById('inNombre').value || "Socio";
            m = parseFloat(document.getElementById('inMonto').value);
            document.getElementById('inNombre').value = ''; document.getElementById('inMonto').value = '';
        } else {
            n = document.getElementById('inProd').value || "Venta";
            m = parseFloat(document.getElementById('inMontoP').value);
            document.getElementById('inProd').value = ''; document.getElementById('inMontoP').value = '';
        }
        if(isNaN(m)) return;
        rawData.push({ id: Date.now(), fecha: inFecha.value, nombre: n, monto: m, tipo });
        localStorage.setItem('bv_pro_v10', JSON.stringify(rawData));
        drawLog();
        popToast("✅ Registro Guardado");
    }

    function doDel(id) {
        rawData = rawData.filter(i => i.id !== id);
        localStorage.setItem('bv_pro_v10', JSON.stringify(rawData));
        drawLog();
    }

    function drawLog() {
        const list = document.getElementById('listaMovs');
        const hoy = inFecha.value;
        const filtrados = rawData.filter(d => d.fecha === hoy);
        if(filtrados.length === 0) { list.innerHTML = `<p style="text-align:center;color:#ccc;font-size:12px;">Vacío</p>`; return; }
        list.innerHTML = filtrados.map(i => `
            <div class="mov-item">
                <div><b>${i.tipo === 'cerrado' ? '📦' : '🥤'} ${i.nombre}</b><span>$ ${i.monto.toFixed(2)}</span></div>
                <button class="btn-del" onclick="doDel(${i.id})">QUITAR</button>
            </div>
        `).join('');
    }

    // REPORTES
    function toggleFilters() {
        const m = selModo.value;
        document.getElementById('f-simple').classList.toggle('hidden', m === 'rango');
        document.getElementById('f-rango').classList.toggle('hidden', m !== 'rango');
        doCalc();
    }

    function doCalc() {
        const modo = selModo.value;
        let filtrados = [];
        let tit = "Cierre Diario", sDate = "";
        let dias = new Set();

        if(modo === 'rango') {
            const dF = new Date(document.getElementById('dateFrom').value + 'T12:00:00');
            const dT = new Date(document.getElementById('dateTo').value + 'T12:00:00');
            filtrados = rawData.filter(d => {
                let f = new Date(d.fecha + 'T12:00:00');
                if(f >= dF && f <= dT) {
                    if(d.tipo === 'normal') dias.add(d.fecha);
                    return true;
                }
                return false;
            });
            tit = "Reporte Personalizado";
            sDate = `${dF.getDate()}/${dF.getMonth()+1} al ${dT.getDate()}/${dT.getMonth()+1}`;
        } else {
            const ref = dateRef.value;
            const dRef = new Date(ref + 'T12:00:00');
            if(modo === 'dia') {
                filtrados = rawData.filter(d => d.fecha === ref);
                sDate = dRef.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            } else if(modo === 'semana') {
                let d = dRef.getDay();
                let diff = (d >= 5) ? (d - 5) : (d + 2);
                let start = new Date(dRef); start.setDate(dRef.getDate() - diff);
                let end = new Date(start); end.setDate(start.getDate() + 6);
                filtrados = rawData.filter(d => {
                    let f = new Date(d.fecha + 'T12:00:00');
                    if(f >= start && f <= end) {
                        if(d.tipo === 'normal') dias.add(d.fecha);
                        return true;
                    }
                    return false;
                });
                tit = "Reporte Semanal";
                sDate = `${start.getDate()}/${start.getMonth()+1} al ${end.getDate()}/${end.getMonth()+1}`;
            } else {
                filtrados = rawData.filter(d => {
                    let f = new Date(d.fecha + 'T12:00:00');
                    if(f.getMonth() === dRef.getMonth() && f.getFullYear() === dRef.getFullYear()) {
                        if(d.tipo === 'normal') dias.add(d.fecha);
                        return true;
                    }
                    return false;
                });
                tit = "Reporte Mensual";
                sDate = dRef.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
            }
        }

        const b = filtrados.filter(f => f.tipo === 'normal');
        const c = filtrados.filter(f => f.tipo === 'cerrado');
        const sB = b.reduce((a, x) => a + x.monto, 0);
        const sC = c.reduce((a, x) => a + x.monto, 0);
        const tot = sB + sC;
        const cTot = (sB / 90).toFixed(2);
        const avg = (cTot / (dias.size || 1)).toFixed(2);
        const verde = (tot * 0.3).toFixed(2);

        document.getElementById('rtit').innerText = tit;
        document.getElementBy
